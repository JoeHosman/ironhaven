id: wandering_priest
name: The Wandering Priest
tags:
  - social
  - faith
  - intrigue

preconditions: []

roles:
  - id: priest
    label: A Wandering Priest
    traitRequirements:
      charisma:
        min: 5
  - id: townsperson
    label: A Skeptical Townsperson
    archetypeFilter:
      - farmer
      - merchant
      - blacksmith

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      A robed figure stands on the well's rim in the square, one hand raised, voice carrying
      over the noise of the market. {priest.name} speaks of signs — cattle restless at night,
      stars out of place, a darkness moving in the east. "The old darkness is returning," they
      call out. "And we are not ready." {townsperson.name} stands nearby rolling their eyes.
      Others look uncertain. A few look afraid.
    choices:
      - id: stop_and_listen
        label: Stop and listen seriously to what the priest is saying
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 1
        nextNodeId: listened
      - id: debate_openly
        label: Step forward and debate the priest's claims in front of the crowd
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: -1
            axis: rivalry
          - type: faction
            target: village_folk
            value: 1
        exhaustionCost: 2
        nextNodeId: debated
      - id: ignore_and_walk_on
        label: Keep walking — town squares always have someone predicting the end
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: ignored

  listened:
    id: listened
    text: >-
      After the crowd thins, {priest.name} steps down and finds you. Up close their eyes are
      calm — not feverish, not mad. "You heard me," they say simply. "Most do not. They will."
      They offer you a small token — a carved wooden disc with a sun-and-crown symbol. "If
      the darkness comes to your door, this is a reminder of what you are defending."
    choices:
      - id: accept_token
        label: Accept the token with thanks
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: priest_token_held
            value: true
        exhaustionCost: 0
        nextNodeId: null
      - id: ask_where_they_come_from
        label: Ask where they have travelled from and what they have seen
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: null

  debated:
    id: debated
    text: >-
      The crowd leans in. You make reasonable points — correlation is not prophecy, fear
      serves the powerful, and cattle are always restless when the weather turns. {priest.name}
      listens carefully and then says: "You argue well. I hope you are right." They say it
      without malice. {townsperson.name} nods vigorously in your direction.
    choices:
      - id: soften_after
        label: Find the priest after and admit their argument gave you pause
        consequences:
          - type: relationship
            target: '{priest.id}'
            value: 2
            axis: respect
          - type: world_fact
            target: heard_priest_warning
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: stand_by_your_words
        label: Stand by what you said — you believe it
        consequences:
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  ignored:
    id: ignored
    text: >-
      You are twenty paces away when a child's voice cuts through — "But what if they are
      right?" You do not stop. But the question follows you the rest of the day.
    choices:
      - id: find_priest_later
        label: Find the priest later in the day and hear them out after all
        consequences:
          - type: world_fact
            target: heard_priest_warning
            value: true
          - type: relationship
            target: '{priest.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: null
      - id: let_it_go
        label: Let it go. You have enough to worry about.
        consequences: []
        exhaustionCost: 0
        nextNodeId: null
