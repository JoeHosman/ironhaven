id: guild_tensions
name: Guild Tensions
tags:
  - social
  - intrigue
  - faction

preconditions: []

roles:
  - id: craftsman
    label: A Guild Craftsman
    archetypeFilter:
      - blacksmith
      - carpenter
  - id: merchant
    label: A Merchant
    archetypeFilter:
      - merchant

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      The argument spills out of the guild hall and into the lane. {craftsman.name} jabs a
      finger at {merchant.name}, face red. "You import shoddy foreign goods and call it trade!
      You are strangling every skilled hand in this town!" The merchant crosses their arms.
      "I sell what the market demands unlike your guild, which demands without producing."
      A crowd is forming. Neither of them has noticed you yet, which means you still have
      a choice about how you enter this.
    choices:
      - id: side_craftsman
        label: Step in and back the craftsman publicly
        consequences:
          - type: faction
            target: craftsmen_guild
            value: 3
          - type: faction
            target: merchants_guild
            value: -2
          - type: relationship
            target: '{craftsman.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: guild_dispute
            value: true
        exhaustionCost: 1
        nextNodeId: sided_craftsman
      - id: side_merchant
        label: Agree with the merchant's free-market argument
        consequences:
          - type: faction
            target: merchants_guild
            value: 3
          - type: faction
            target: craftsmen_guild
            value: -2
          - type: relationship
            target: '{merchant.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: guild_dispute
            value: true
        exhaustionCost: 1
        nextNodeId: sided_merchant
      - id: mediate
        label: Step between them and call for calm
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: craftsmen_guild
            value: 1
          - type: faction
            target: merchants_guild
            value: 1
          - type: world_fact
            target: guild_dispute
            value: true
        exhaustionCost: 2
        nextNodeId: mediated
      - id: watch_and_leave
        label: Watch in silence you want to understand before acting
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: guild_dispute
            value: true
        exhaustionCost: 0
        nextNodeId: watched

  sided_craftsman:
    id: sided_craftsman
    text: >-
      {craftsman.name} straightens, emboldened. {merchant.name} narrows their eyes at you.
      "Another guild lapdog." They walk away with the deliberate pace of someone who is not
      finished, only postponing. The craftsman grips your arm. "We will remember our friends
      when it matters." The crowd disperses. {craftsman.name} lowers their voice. "The import
      ledgers the merchant is hiding I have seen copies. Come to the hall tonight. There
      is more to this than a street argument."
    choices:
      - id: agree_to_hall_meeting
        label: Agree to come to the guild hall tonight
        consequences:
          - type: relationship
            target: '{craftsman.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: guild_hall_meeting_arranged
            value: true
        exhaustionCost: 1
        nextNodeId: learns_stakes
      - id: ask_whats_at_stake
        label: Ask what exactly is being disputed before committing to anything
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: learns_stakes

  sided_merchant:
    id: sided_merchant
    text: >-
      {merchant.name} gives you a thin, satisfied smile. {craftsman.name} spits on the
      cobblestones and storms off "You will regret this," they call back. The merchant
      smooths their coat. "Sensible. Come walk with me. There is opportunity for people
      who understand how trade actually works. The guild is trying to force a new levy on
      imports. If it passes, half the market stalls will empty within the year. I need
      someone to carry a message to the alderman a private message. No names. You would
      be doing the whole town a service."
    choices:
      - id: agree_to_carry_message
        label: Agree to carry the message to the alderman
        consequences:
          - type: relationship
            target: '{merchant.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: carrying_merchant_message
            value: true
        exhaustionCost: 1
        nextNodeId: learns_stakes
      - id: ask_what_message_says
        label: Ask to know what is in the message before carrying it
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{merchant.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: learns_stakes

  mediated:
    id: mediated
    text: >-
      Both parties glare at you, then at each other. The crowd disperses, muttering.
      Neither is truly satisfied but the shouting stops. {craftsman.name} shakes their
      head. "Pretty words do not fix a broken market." {merchant.name} straightens their
      coat. "At least someone here has some sense." Before they separate, you catch
      something pass between them not a word, but a look. The look of two people who
      have had this conversation before, who know exactly where it ends, and who are
      playing to a different audience than the crowd.
    choices:
      - id: press_for_meeting
        label: Suggest they meet formally with a neutral party present you
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: craftsmen_guild
            value: 1
          - type: faction
            target: merchants_guild
            value: 1
        exhaustionCost: 2
        nextNodeId: learns_stakes
      - id: follow_the_merchant
        label: Let them go but follow the merchant at a distance
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: merchant_followed
            value: true
        exhaustionCost: 1
        nextNodeId: learns_stakes

  watched:
    id: watched
    text: >-
      You drift to the edge of the crowd and keep still. You hear it all. Trade rights.
      Import fees. An alderman who has been taking payments from both guilds. A vote
      scheduled for the end of the month that could reshape commerce in Ironhaven for
      a generation. Neither {craftsman.name} nor {merchant.name} notices you watching
      or if they do, they do not care. You are just another face. That is useful.
    choices:
      - id: approach_craftsman_alone
        label: Wait until the merchant leaves, then approach {craftsman.name} privately
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{craftsman.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: learns_stakes
      - id: approach_merchant_alone
        label: Wait until the craftsman leaves, then approach {merchant.name} privately
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{merchant.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: learns_stakes

  learns_stakes:
    id: learns_stakes
    text: >-
      Whatever thread brought you here the guild hall, a private conversation, or a
      quiet piece of information gathered from the edge of a crowd the core of the
      dispute is the same: there is a vote in three days before the town aldermen. The
      craftsmen's guild wants a protective levy on imported goods. The merchants want it
      blocked. The alderman who will cast the deciding vote is a man who has taken money
      from both sides. He is, at this moment, undecided or rather, waiting to see
      which side applies more pressure. You have been handed the shape of the lever.
      The question is what you do with it.
    choices:
      - id: approach_alderman
        label: Go to the alderman directly let them know you understand the situation
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: alderman_approached
            value: true
        exhaustionCost: 2
        nextNodeId: confrontation
      - id: use_info_as_leverage
        label: Hold the information and let both guilds know you could go either way
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: playing_both_guilds
            value: true
        exhaustionCost: 1
        nextNodeId: confrontation
      - id: take_it_to_guard
        label: Take what you know about the alderman to the town guard
        consequences:
          - type: faction
            target: town_guard
            value: 2
          - type: world_fact
            target: alderman_corruption_reported
            value: true
        exhaustionCost: 1
        nextNodeId: confrontation

  confrontation:
    id: confrontation
    text: >-
      Whatever move you made, the board shifts. {craftsman.name} and {merchant.name}
      both know something has changed by the end of the day you can read it in the
      way they each give you a slightly longer look when your paths cross in the square.
      The vote will happen. The outcome is no longer certain. And your position in
      the space between these two factions has been established, whether you intended
      it or not.
    choices:
      - id: build_craftsman_alliance
        label: Commit to the craftsmen's cause before the vote
        consequences:
          - type: faction
            target: craftsmen_guild
            value: 3
          - type: faction
            target: merchants_guild
            value: -1
          - type: relationship
            target: '{craftsman.id}'
            value: 2
            axis: respect
        exhaustionCost: 1
        nextNodeId: null
      - id: build_merchant_alliance
        label: Commit to the merchant's position before the vote
        consequences:
          - type: faction
            target: merchants_guild
            value: 3
          - type: faction
            target: craftsmen_guild
            value: -1
          - type: relationship
            target: '{merchant.id}'
            value: 2
            axis: respect
        exhaustionCost: 1
        nextNodeId: null
      - id: stay_neutral
        label: Stay neutral your value is precisely that you have not committed
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: guild_neutral_broker
            value: true
        exhaustionCost: 0
        nextNodeId: null
