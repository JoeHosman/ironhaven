id: midnight_visitor
name: The Midnight Visitor
tags:
  - intrigue
  - social

preconditions: []

roles:
  - id: visitor
    label: A Late-Night Visitor
    archetypeFilter:
      - merchant
      - soldier
      - farmer
    traitRequirements:
      cunning:
        min: 3

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      Three knocks. Not loud — careful. It is two hours past midnight and you were
      not sleeping well anyway. The candle is still burning. Outside: silence between
      each knock. Not drunk. Not panicking. Whoever {visitor.name} is, they chose this
      hour deliberately, and they know you are awake.
    choices:
      - id: open_door
        label: Open the door — you want to know what this is
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{visitor.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: opened
      - id: call_out_first
        label: Call out without opening — ask who is there
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: called_out
      - id: pretend_asleep
        label: Go still and pretend you are not home
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{visitor.id}'
            value: -1
            axis: trust
        exhaustionCost: 0
        nextNodeId: pretended

  opened:
    id: opened
    text: >-
      {visitor.name} steps inside quickly and closes the door behind them. Their hands
      are shaking but their voice is steady. "I need you to hold something for me. Just
      for two days. I cannot explain why, not fully. But if you are searched — and you
      will not be, I promise — you need to say you found it. Not that I gave it to you."
      They press a sealed packet into your hands. It is warm and heavier than it looks.
    choices:
      - id: agree_to_hold
        label: Agree — two days is not forever, and something about this feels important
        consequences:
          - type: relationship
            target: '{visitor.id}'
            value: 3
            axis: trust
          - type: relationship_tag
            target: '{visitor.id}'
            value: holds_secret
          - type: world_fact
            target: hidden_packet_held
            value: true
        exhaustionCost: 1
        nextNodeId: agreed
      - id: refuse_and_demand_answers
        label: Refuse until they tell you what is in the packet
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{visitor.id}'
            value: -1
            axis: trust
        exhaustionCost: 1
        nextNodeId: demanded_answers
      - id: refuse_outright
        label: Refuse — no explanation means no deal
        consequences:
          - type: relationship
            target: '{visitor.id}'
            value: -2
            axis: rivalry
        exhaustionCost: 0
        nextNodeId: refused

  called_out:
    id: called_out
    text: >-
      A voice, low: "{visitor.name}. You know me." You do — not well, but enough. The
      fact that they came here means something. You weigh the door between you.
    choices:
      - id: open_after_all
        label: Open the door — the voice tells you enough
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{visitor.id}'
            value: 2
            axis: trust
        exhaustionCost: 1
        nextNodeId: opened
      - id: refuse_through_door
        label: Tell them to come back in daylight if it is important
        consequences:
          - type: relationship
            target: '{visitor.id}'
            value: -1
            axis: trust
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  pretended:
    id: pretended
    text: >-
      Three more knocks. Then silence. The sound of footsteps retreating. You lie still
      in the dark listening to the town breathe. An hour later you are still awake and
      the question has not gone anywhere.
    choices:
      - id: feel_the_right_call
        label: It was the right call. Midnight visitors mean trouble.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
      - id: regret_it
        label: You should have answered. Something important just walked away from your door.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: missed_midnight_message
            value: true
        exhaustionCost: 0
        nextNodeId: null

  agreed:
    id: agreed
    text: >-
      {visitor.name} is gone in seconds. You sit with the packet in your lap. You do not
      open it. The seal is unfamiliar — wax, no crest. It weighs like a decision. Two days,
      they said.
    choices:
      - id: hide_it_well
        label: Find a secure hiding place — behind the flue, under the floorboard
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: null
      - id: open_it
        label: Open the seal — you need to know what you are holding
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: hidden_packet_opened
            value: true
          - type: relationship
            target: '{visitor.id}'
            value: -1
            axis: trust
        exhaustionCost: 0
        nextNodeId: null

  demanded_answers:
    id: demanded_answers
    text: >-
      {visitor.name} hesitates. Then they tell you part of it — enough to understand the
      shape of the danger without naming it. Someone important wants this. {visitor.name}
      cannot keep it themselves. "Two days," they say again. "Then it is gone from your life."
    choices:
      - id: agree_with_knowledge
        label: With that much known — agree to hold it
        consequences:
          - type: world_fact
            target: hidden_packet_held
            value: true
          - type: relationship
            target: '{visitor.id}'
            value: 2
            axis: trust
        exhaustionCost: 1
        nextNodeId: null
      - id: still_refuse
        label: Still not enough. Tell them no.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  refused:
    id: refused
    text: >-
      {visitor.name} takes the packet back without argument. "I understand," they say,
      and mean it. They close the door quietly. You hear them move away. You do not know
      if you made the right call. You do know you will hear about this later.
    choices:
      - id: lock_the_door
        label: Lock the door and try to sleep
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
