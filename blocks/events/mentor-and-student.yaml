id: mentor_and_student
name: Mentor and Student
tags:
  - social
  - intrigue

preconditions: []

roles:
  - id: mentor
    label: An Experienced Elder
    traitRequirements:
      strength:
        min: 4
      cunning:
        min: 4
    archetypeFilter:
      - blacksmith
      - soldier
      - merchant

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      {mentor.name} has been watching you work for three days. Today, they pull up a stool and say:
      "You have talent, but you are wasting it on the wrong habits. I could show you something
      better if you are willing to be taught." There is no flattery in it. Just the matter-of-fact
      confidence of someone who has earned the right to say it.
    choices:
      - id: accept_eagerly
        label: Accept you have wanted a teacher for a long time
        consequences:
          - type: stat
            target: strength
            value: 1
          - type: relationship
            target: '{mentor.id}'
            value: 2
            axis: trust
          - type: relationship
            target: '{mentor.id}'
            value: 2
            axis: respect
          - type: relationship_tag
            target: '{mentor.id}'
            value: mentor
        exhaustionCost: 2
        nextNodeId: accepted
      - id: accept_cautiously
        label: Accept, but push back on one of their assumptions
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{mentor.id}'
            value: 1
            axis: trust
          - type: relationship
            target: '{mentor.id}'
            value: 1
            axis: respect
        exhaustionCost: 2
        nextNodeId: pushed_back
      - id: decline
        label: Decline you have your own way of doing things
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{mentor.id}'
            value: -1
            axis: respect
        exhaustionCost: 0
        nextNodeId: declined

  accepted:
    id: accepted
    text: >-
      {mentor.name} nods as if they expected nothing less. The lesson begins immediately no
      ceremony, no preamble. By the end of the afternoon your back aches and your technique has
      changed in three small ways that feel, you suspect, enormous. "Same time tomorrow," they say,
      walking away before you can thank them.
    choices:
      - id: practice_tonight
        label: Practice what they showed you tonight on your own
        consequences:
          - type: stat
            target: strength
            value: 1
          - type: exhaustion
            target: self
            value: 1
          - type: relationship_tag
            target: '{mentor.id}'
            value: mentor
        exhaustionCost: 2
        nextNodeId: null
      - id: reflect_on_lesson
        label: Sit with the lesson before practicing absorb it properly
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship_tag
            target: '{mentor.id}'
            value: mentor
        exhaustionCost: 1
        nextNodeId: null

  pushed_back:
    id: pushed_back
    text: >-
      {mentor.name} pauses. Then: "Explain." You do. They think. "Not wrong," they say at last,
      with visible reluctance. "But not complete either. Show me how you would do it better."
      You spend two hours arguing by demonstration. It is the best lesson you have had in years.
    choices:
      - id: keep_pushing
        label: Keep challenging their methods as you learn
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: relationship
            target: '{mentor.id}'
            value: 2
            axis: respect
          - type: relationship_tag
            target: '{mentor.id}'
            value: mentor
        exhaustionCost: 2
        nextNodeId: null
      - id: defer_going_forward
        label: You have made your point defer to their experience now
        consequences:
          - type: stat
            target: strength
            value: 1
          - type: relationship
            target: '{mentor.id}'
            value: 1
            axis: trust
          - type: relationship_tag
            target: '{mentor.id}'
            value: mentor
        exhaustionCost: 1
        nextNodeId: null

  declined:
    id: declined
    text: >-
      {mentor.name} shrugs with the ease of someone who has been declined before. "The offer stands
      until it doesn't." They return to their own work without another word. You go back to yours.
      Around the third hour, you start noticing a habit they mentioned the wrong grip, the wasted
      motion. You keep doing it anyway.
    choices:
      - id: reconsider
        label: Go to them tell them you reconsidered
        consequences:
          - type: relationship
            target: '{mentor.id}'
            value: 2
            axis: respect
          - type: relationship_tag
            target: '{mentor.id}'
            value: mentor
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 1
        nextNodeId: null
      - id: stand_firm
        label: Stand by the choice your way is yours
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
