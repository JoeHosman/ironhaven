id: wolf_sighting
name: Wolf Sighting
tags:
  - action
  - exploration

preconditions: []

roles:
  - id: shepherd
    label: A Frightened Shepherd
    archetypeFilter:
      - farmer
  - id: hunter
    label: A Local Hunter
    archetypeFilter:
      - farmer
      - soldier

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      {shepherd.name} runs into town at first light, sheep pen empty behind them. "Three
      of them," they gasp. "Big ones, grey. They came out of the Ashwood." The flock is
      scattered across the hillside. {hunter.name} is already checking their bow outside
      the tavern. "I have been waiting for this," the hunter says quietly. "They have been
      circling closer for a month. Something in the wood has pushed them out." They look
      at you. "You coming?"
    choices:
      - id: hunt_with_hunter
        label: Join {hunter.name} go out and hunt the wolves
        consequences:
          - type: stat
            target: strength
            value: 1
          - type: relationship
            target: '{hunter.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: wolves_hunted
            value: true
        exhaustionCost: 3
        nextNodeId: went_hunting
      - id: track_them
        label: Track the wolves to understand their range before deciding anything
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: wolves_tracked
            value: true
        exhaustionCost: 2
        nextNodeId: tracked
      - id: warn_shepherds
        label: Warn the other shepherds and help them secure their pens first
        consequences:
          - type: faction
            target: village_folk
            value: 2
          - type: relationship
            target: '{shepherd.id}'
            value: 3
            axis: trust
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 2
        nextNodeId: warned

  went_hunting:
    id: went_hunting
    text: >-
      You and {hunter.name} spend four hours in the Ashwood. The forest is wrong in a way
      that is hard to name too quiet in the wrong places, too loud in others. You find two
      wolves at midday cornered against a dry creek bed. {hunter.name} takes their shot.
      You move to flank. When it is over, {hunter.name} crouches over the fallen animal.
      "Starving," they say. "Look at the ribs." The wolf is thin under its winter coat
      thin in the way of something that has been running rather than hunting. "Something
      drove them out," {hunter.name} says. "Same thing that drove them here."
    choices:
      - id: press_on_for_third
        label: Track down the third wolf finish what you started
        preconditions:
          - type: trait
            key: strength
            min: 4
        consequences:
          - type: stat
            target: strength
            value: 2
          - type: faction
            target: village_folk
            value: 2
        exhaustionCost: 3
        nextNodeId: deep_ashwood
      - id: investigate_what_drove_them
        label: Follow the wolves' back-trail deeper into the wood find out what pushed them
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: wolves_tracked
            value: true
        exhaustionCost: 2
        nextNodeId: tracked

  tracked:
    id: tracked
    text: >-
      The tracks lead north, deeper into the Ashwood than you expected. The wolves are not
      ranging randomly they are moving in a deliberate circuit, as though searching for
      something rather than hunting. You find three kill sites, all deer. At the far end
      of the track, you find a print larger than the others. A fourth wolf. Exceptionally
      large. And beyond that print: the tracks stop. Not because the wolf doubled back. The
      ground ahead is bare a wide, irregular patch where nothing grows. Not burned. Just
      bare. The soil looks pressed. Ancient. You feel watched.
    choices:
      - id: mark_and_report
        label: Mark the territory and turn back report to the town
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: faction
            target: village_folk
            value: 1
          - type: world_fact
            target: wolf_territory_mapped
            value: true
        exhaustionCost: 1
        nextNodeId: return_and_report
      - id: follow_the_big_track
        label: Follow the larger track further you want to see this yourself
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: wolf_den_suspected
            value: true
        exhaustionCost: 3
        nextNodeId: deep_ashwood

  warned:
    id: warned
    text: >-
      You spend the morning going door to door. Most are grateful. Two ignore you.
      By afternoon the pens are tighter and people are keeping their dogs close.
      {shepherd.name} finds you at day's end. "My flock is accounted for. Every one."
      Then they drop their voice. "Marren's boy was out in the north pasture this morning.
      He saw the wolves pass. He says there were not three. He says there were six. And
      something with them he does not have words for it. He is eleven. He said it
      walked upright."
    choices:
      - id: go_to_marren_boy
        label: Go talk to Marren's boy directly
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: upright_creature_reported
            value: true
        exhaustionCost: 1
        nextNodeId: strange_witness
      - id: tell_hunter
        label: Find {hunter.name} and tell them what you heard
        consequences:
          - type: relationship
            target: '{hunter.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: upright_creature_reported
            value: true
        exhaustionCost: 1
        nextNodeId: strange_witness

  strange_witness:
    id: strange_witness
    text: >-
      The boy is steady for eleven not prone to invention. He describes it clearly:
      taller than a man, moving at the edge of the wolf pack, not chasing them and not
      fleeing with them. Accompanying them. He watched until it turned and looked directly
      at him from too far away, he says, to have seen his face. Then it turned back and
      continued north, and the wolves went with it. He went home. He did not tell his
      father. "It did not feel like a monster," the boy says. "It felt like it was
      going somewhere."
    choices:
      - id: go_into_deep_wood
        label: Go into the Ashwood and follow the direction the boy indicated
        consequences:
          - type: stat
            target: strength
            value: 1
          - type: world_fact
            target: investigating_deep_ashwood
            value: true
        exhaustionCost: 3
        nextNodeId: deep_ashwood
      - id: report_and_wait
        label: Report this to the guard and {hunter.name} wait for a larger party
        consequences:
          - type: faction
            target: town_guard
            value: 1
          - type: world_fact
            target: ashwood_alert_raised
            value: true
        exhaustionCost: 1
        nextNodeId: return_and_report

  deep_ashwood:
    id: deep_ashwood
    text: >-
      You are deep in the Ashwood when you find the place. A clearing that should not exist
      the trees pull back in a perfect ring. At the centre: a flat stone, smooth and very old.
      The wolves are there. Three of them, sitting at the edge of the clearing. Not prowling.
      Waiting. They look at you. One of them lowers its head not an attack posture. Something
      else. The large prints lead to the stone and stop. Whatever was here, it is not here now.
      But it was here recently. The stone is warm to the touch.
    choices:
      - id: approach_wolves
        label: Move toward the wolves slowly they are not threatening you
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: wolf_clearing_found
            value: true
          - type: world_fact
            target: made_contact_with_wolves
            value: true
        exhaustionCost: 2
        nextNodeId: return_and_report
      - id: examine_the_stone
        label: Move to the stone and examine it while the wolves watch
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: wolf_clearing_found
            value: true
          - type: world_fact
            target: ashwood_stone_examined
            value: true
        exhaustionCost: 2
        nextNodeId: return_and_report
      - id: back_away_carefully
        label: Back out of the clearing slowly without turning your back on the wolves
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: wolf_clearing_found
            value: true
        exhaustionCost: 1
        nextNodeId: return_and_report

  return_and_report:
    id: return_and_report
    text: >-
      You come back out of the Ashwood with dusk at your back and something changed in
      your chest not quite fear, not quite wonder, a third thing between them. {shepherd.name}
      is at the edge of the pasture, waiting. {hunter.name} is somewhere in the village,
      and will want to know what you found. What you tell them and how much of it
      will shape what Ironhaven does next about the Ashwood.
    choices:
      - id: tell_everything
        label: Tell {shepherd.name} and {hunter.name} everything all of it
        consequences:
          - type: relationship
            target: '{shepherd.id}'
            value: 1
            axis: trust
          - type: relationship
            target: '{hunter.id}'
            value: 2
            axis: trust
          - type: faction
            target: village_folk
            value: 1
          - type: world_fact
            target: ashwood_truth_shared
            value: true
        exhaustionCost: 0
        nextNodeId: null
      - id: partial_report
        label: Report the wolves as handled keep the clearing and the stone to yourself
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: ashwood_secret_kept
            value: true
        exhaustionCost: 0
        nextNodeId: null
