id: underground_shrine
name: The Underground Shrine
tags:
  - mystery
  - danger
  - exploration

preconditions:
  - type: world_fact
    key: passage_found
    value: true

roles:
  - id: companion
    label: A Trusted Companion
    archetypeFilter:
      - blacksmith
      - farmer
      - merchant

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      Beyond the chamber with the empty plinth, the passage continues. It was not visible before
      the angle of the lantern had to be just right. You follow it another fifty paces and step
      through a low arch into a shrine. Intact. Alive, in a way that has nothing to do with
      candlelight the carvings seem to move at the edge of your vision. An altar stone holds a
      single artifact: a disc of dark metal, inscribed in Karathi, warm to the touch though the
      air down here is freezing. {companion.name} stands beside you, saying nothing.
    choices:
      - id: pray_at_altar
        label: Kneel and pray whatever this place is, show it respect
        consequences:
          - type: stat
            target: charisma
            value: 2
          - type: faction
            target: village_folk
            value: 1
          - type: world_fact
            target: shrine_honored
            value: true
        exhaustionCost: 2
        nextNodeId: prayed
      - id: take_artifact
        label: Take the disc it may be the key to something larger
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: artifact_taken
            value: true
        exhaustionCost: 2
        nextNodeId: took_artifact
      - id: destroy_shrine
        label: Destroy the shrine this is demon-touched ground
        consequences:
          - type: stat
            target: strength
            value: 2
          - type: world_fact
            target: shrine_destroyed
            value: true
          - type: questline
            target: 'demon_invasion:seals_broken'
            value: 1
        exhaustionCost: 4
        nextNodeId: destroyed
      - id: observe_only
        label: Touch nothing observe and leave
        consequences:
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 1
        nextNodeId: observed

  prayed:
    id: prayed
    text: >-
      Something shifts in the quality of the silence. Not threatening attentive. As if the
      shrine has noticed you. When you rise, your hands are trembling slightly, and {companion.name}
      puts a steadying hand on your shoulder. "Did you feel that?" they whisper. Whatever it was,
      it felt like an answer.
    choices:
      - id: stay_longer
        label: Stay longer and listen to whatever is speaking
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: prophecy_known
            value: true
        exhaustionCost: 3
        nextNodeId: null
      - id: leave_respectfully
        label: Leave respectfully you have what you came for
        consequences:
          - type: relationship
            target: '{companion.id}'
            value: 1
            axis: affection
        exhaustionCost: 0
        nextNodeId: null

  took_artifact:
    id: took_artifact
    text: >-
      The disc is heavier than it looks. The moment it leaves the altar stone, a sound low,
      sustained, felt more than heard moves through the passage. {companion.name} grabs your
      arm. "We need to go. Now." You both run. Behind you, the sound fades. But you are holding
      something you cannot name, and you feel it pulse faintly against your palm all the way home.
    choices:
      - id: keep_artifact_secret
        label: Keep the artifact secret and study it yourself
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: artifact_hidden
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: show_scholar
        label: Show it to someone with the knowledge to understand it
        consequences:
          - type: world_fact
            target: artifact_examined
            value: true
          - type: questline
            target: 'demon_invasion:lore_uncovered'
            value: 1
        exhaustionCost: 2
        nextNodeId: null

  destroyed:
    id: destroyed
    text: >-
      You bring your hammer down on the altar stone. The disc shatters with a sound like a scream
      heard underwater. The carvings go dark. {companion.name} backs toward the passage. Something
      cold and purposeful moves through the air not wind. Then nothing. The shrine is rubble.
      You do not feel victorious.
    choices:
      - id: bury_rubble
        label: Make sure it is thoroughly buried before you leave
        consequences:
          - type: stat
            target: strength
            value: 1
          - type: exhaustion
            target: self
            value: 2
        exhaustionCost: 3
        nextNodeId: null
      - id: leave_it
        label: Leave the rubble and get out
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  observed:
    id: observed
    text: >-
      You study the shrine for a long time without touching anything. The disc on the altar stone.
      The Karathi inscriptions on the walls. The worn depressions in the floor where generations
      of knees have pressed. Someone maintained this place for a very long time. Someone stopped
      not long ago. {companion.name} waits by the arch, giving you space.
    choices:
      - id: record_observations
        label: Record everything you observe carefully
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: symbols_studied
            value: true
        exhaustionCost: 2
        nextNodeId: null
      - id: leave_quietly
        label: Leave quietly and think on it
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
