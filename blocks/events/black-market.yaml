id: black_market
name: The Black Market Offer
tags:
  - intrigue
  - trade
  - faction

preconditions:
  - operator: or
    conditions:
      - type: world_fact
        key: corruption_paid
        value: true
      - type: world_fact
        key: caravan_arrived
        value: true

roles:
  - id: contact
    label: A Shadowy Contact
    archetypeFilter:
      - merchant
    traitRequirements:
      cunning:
        min: 5

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      After dark, someone falls into step beside you on a quiet lane. {contact.name} —
      someone you have seen at the edges of market days — speaks without looking at you.
      "The guilds tax everything. Guard levies on top of that. Some of us move goods outside
      all that." A pause. "Better prices. No records. You look like someone who understands
      the value of discretion."
    choices:
      - id: hear_them_out
        label: Keep walking and hear them out
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{contact.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: black_market_known
            value: true
        exhaustionCost: 1
        nextNodeId: heard_out
      - id: refuse_sharply
        label: Tell them you want no part of it and step away
        consequences:
          - type: faction
            target: town_guard
            value: 1
          - type: relationship
            target: '{contact.id}'
            value: -2
            axis: rivalry
        exhaustionCost: 0
        nextNodeId: refused
      - id: feign_interest
        label: Play along — you want to know who else is involved
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: black_market_known
            value: true
        exhaustionCost: 1
        nextNodeId: feigned

  heard_out:
    id: heard_out
    text: >-
      {contact.name} describes a network of buyers and sellers operating out of three
      locations in town — a back room in the tanner's yard, the lower cellars of the
      old mill, a wagon that moves every week. "We have things the caravans do not declare.
      You buy, you sell, you keep quiet." They press a folded note into your hand. "Think
      about it."
    choices:
      - id: join_network
        label: Agree to participate — the opportunity is real
        consequences:
          - type: relationship
            target: '{contact.id}'
            value: 2
            axis: trust
          - type: faction
            target: merchants_guild
            value: -1
          - type: world_fact
            target: joined_black_market
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: take_note_and_decide_later
        label: Take the note and say you need time to consider
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  refused:
    id: refused
    text: >-
      {contact.name} stops walking. Their expression does not change. "No hard feelings,"
      they say, and turns off down an alley. But you feel their eyes on you until the
      corner takes them from sight. They will wonder whether you can be trusted to stay quiet.
    choices:
      - id: report_to_guard
        label: Report what you heard to the town guard
        consequences:
          - type: faction
            target: town_guard
            value: 2
          - type: world_fact
            target: black_market_reported
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: keep_it_to_yourself
        label: Say nothing to no one — it is not your problem
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  feigned:
    id: feigned
    text: >-
      You play it well. {contact.name} gives you two names — a grain merchant with a second
      ledger and a dock hand who runs sealed crates. Real names. Real details. You smile and
      say you will be in touch. When you are alone again, you have a choice about what to do
      with what you know.
    choices:
      - id: use_info_against_them
        label: Take the names to the guild masters — this is leverage
        consequences:
          - type: faction
            target: merchants_guild
            value: 2
          - type: world_fact
            target: black_market_exposed
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: use_info_to_join_cleverly
        label: Use the names to negotiate your own better terms for joining
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: joined_black_market
            value: true
        exhaustionCost: 1
        nextNodeId: null
