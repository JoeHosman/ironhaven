id: siege_preparations
name: Siege Preparations
tags:
  - faction
  - questline
  - action

preconditions:
  - type: questline_stage
    key: demon_invasion
    value: border_falls
    operator: gte

roles:
  - id: engineer
    label: The Town Engineer
    traitRequirements:
      strength:
        min: 4
  - id: captain
    label: The Guard Captain
    archetypeFilter:
      - soldier
    factionRequirements:
      - town_guard

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      {captain.name} has called every able body to the square. {engineer.name} unrolls a map of
      the town walls patched, old, not designed for what is coming. "We have perhaps a week,"
      {captain.name} says. "Maybe less. The question is how we spend it." They look around the
      crowd. "I need three things: stronger walls, food stores that will last, and a plan if the
      walls fail. Who is doing what?"
    choices:
      - id: fortify_walls
        label: Join the wall-fortification crew under {engineer.name}
        consequences:
          - type: stat
            target: strength
            value: 2
          - type: faction
            target: town_guard
            value: 2
          - type: questline
            target: 'demon_invasion:siege_preparation'
            value: 2
          - type: world_fact
            target: helped_fortify_walls
            value: true
        exhaustionCost: 4
        nextNodeId: fortified
      - id: stockpile_food
        label: Organize the food stockpile logistics will win or lose this
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: faction
            target: village_folk
            value: 2
          - type: questline
            target: 'demon_invasion:siege_preparation'
            value: 2
          - type: world_fact
            target: food_stockpiled
            value: true
        exhaustionCost: 3
        nextNodeId: stockpiled
      - id: plan_escape
        label: Quietly plan an escape route for civilians if the walls fall
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: escape_route_planned
            value: true
        exhaustionCost: 2
        nextNodeId: planned_escape

  fortified:
    id: fortified
    text: >-
      Three days of hauling stone and hammering braces. Your hands blister and your back screams.
      {engineer.name} works beside you without complaint and twice says "good" which, you learn,
      is their highest form of praise. The north wall is now solid enough to matter. The east wall
      is another question.
    choices:
      - id: keep_going_east
        label: Push through exhaustion and tackle the east wall too
        consequences:
          - type: stat
            target: strength
            value: 1
          - type: exhaustion
            target: self
            value: 3
          - type: questline
            target: 'demon_invasion:siege_preparation'
            value: 1
        exhaustionCost: 4
        nextNodeId: null
      - id: rest_and_brief_others
        label: Rest and brief the next crew on what you learned
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: questline
            target: 'demon_invasion:siege_preparation'
            value: 1
        exhaustionCost: 1
        nextNodeId: null

  stockpiled:
    id: stockpiled
    text: >-
      The numbers are not encouraging. At current population, including refugees, you have food
      for twelve days if rationing is strict. You present this to {captain.name}, who nods once,
      sharply. "Then we will be strict." They look at you. "I want you managing the distribution.
      You have the head for it."
    choices:
      - id: accept_distribution_role
        label: Accept the responsibility
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 2
          - type: faction
            target: town_guard
            value: 1
          - type: questline
            target: 'demon_invasion:siege_preparation'
            value: 1
        exhaustionCost: 2
        nextNodeId: null
      - id: decline_distribution_role
        label: Decline you have other skills needed elsewhere
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  planned_escape:
    id: planned_escape
    text: >-
      You walk the town perimeter after dark. The old tannery has a collapsed section of outer wall
      that has been quietly ignored for years. Beyond it, a dry drainage channel runs northeast
      for half a mile before opening into the forest. Passable. Defensible from pursuit, briefly.
      You make careful notes and share them with no one yet.
    choices:
      - id: share_with_captain
        label: Share the route with {captain.name} they need contingency plans
        consequences:
          - type: faction
            target: town_guard
            value: 1
          - type: relationship
            target: '{captain.id}'
            value: 2
            axis: trust
          - type: questline
            target: 'demon_invasion:siege_preparation'
            value: 1
        exhaustionCost: 1
        nextNodeId: null
      - id: keep_private
        label: Keep it private knowledge of an exit is power
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: secret_exit_known
            value: true
        exhaustionCost: 0
        nextNodeId: null
