id: lost_child
name: Lost Child
tags:
  - social

preconditions: []

roles:
  - id: child
    label: A Lost Child
    archetypeFilter:
      - farmer
  - id: parent
    label: A Frantic Parent
    archetypeFilter:
      - farmer
      - merchant
      - blacksmith

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      A small figure is sitting on the edge of the well in the square, crying quietly —
      the kind of crying that has been going on long enough to run out of sound. {child.name}
      is perhaps seven years old, their face red and wet. When you stop, they look up.
      "I cannot find my mother," they say. Around you, the market crowd flows on without
      pausing.
    choices:
      - id: help_find_parent
        label: Take the child's hand and start asking around the market
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: village_folk
            value: 2
          - type: relationship
            target: '{child.id}'
            value: 3
            axis: trust
        exhaustionCost: 2
        nextNodeId: searched
      - id: ask_child_for_clues
        label: Crouch down and ask the child what their parent looks like and where they last saw them
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{child.id}'
            value: 2
            axis: trust
        exhaustionCost: 1
        nextNodeId: asked_child
      - id: keep_walking
        label: Keep walking — someone else will sort it
        consequences:
          - type: faction
            target: village_folk
            value: -1
        exhaustionCost: 0
        nextNodeId: walked_on

  searched:
    id: searched
    text: >-
      You spend twenty minutes working the stalls, the child's hand in yours. Most people
      shake their heads. A cloth merchant points toward the baker's. You find {parent.name}
      outside it, frantic, calling the child's name in a voice stripped raw. The reunion
      is quick and clutching and loud. {parent.name} looks up at you over the child's
      head. "Thank you," they say. It is all they can manage.
    choices:
      - id: accept_thanks
        label: Accept their thanks simply and go
        consequences:
          - type: relationship
            target: '{parent.id}'
            value: 2
            axis: affection
        exhaustionCost: 0
        nextNodeId: null
      - id: stay_and_check
        label: Stay for a moment to make sure they are both all right
        consequences:
          - type: faction
            target: village_folk
            value: 1
          - type: relationship
            target: '{parent.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: null

  asked_child:
    id: asked_child
    text: >-
      The child tells you their parent is "tall with a blue hat" and they last saw them
      "near the loud place" — which turns out to be the forge. You take them there.
      {parent.name} is sitting against the forge wall, head in their hands, having
      searched the whole wrong side of the square. The child runs the last ten feet.
    choices:
      - id: leave_quietly
        label: Leave without making a fuss — they have what they need
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: faction
            target: village_folk
            value: 1
        exhaustionCost: 0
        nextNodeId: null
      - id: speak_to_parent
        label: Speak to {parent.name} for a moment — make sure the child is all right
        consequences:
          - type: relationship
            target: '{parent.id}'
            value: 2
            axis: trust
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 1
        nextNodeId: null

  walked_on:
    id: walked_on
    text: >-
      Fifty paces later you can still hear the faint crying. You do not go back. An hour
      later, someone else must have helped — the well is empty. The child's face stays
      with you longer than the hour does.
    choices:
      - id: let_it_go
        label: Let it go. The child was found. It was not your responsibility.
        consequences: []
        exhaustionCost: 0
        nextNodeId: null
      - id: resolve_to_do_better
        label: Resolve to act faster next time. That was not your best.
        consequences:
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 0
        nextNodeId: null
