id: satchels_secret
name: The Satchel's Secret
tags:
  - intrigue
  - social

preconditions:
  - type: world_fact
    key: traveler_hidden
    value: true

roles:
  - id: traveler
    label: The Hidden Traveler
    traitRequirements:
      cunning:
        min: 3

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      You find {traveler.name} where you left them. They look steadier now, though their hands still
      shake. "I owe you an explanation," they say. They open the satchel. Inside, wrapped in
      oilcloth: a sheaf of letters bearing a noble crest correspondence between someone in this
      town and someone who should be an enemy.
    choices:
      - id: help_deliver
        label: Agree to help get the letters where they need to go
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{traveler.id}'
            value: 3
            axis: trust
          - type: world_fact
            target: satchel_delivered
            value: true
        exhaustionCost: 2
        nextNodeId: agreed_to_deliver
      - id: open_it_yourself
        label: Read the letters yourself before deciding anything
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: satchel_opened
            value: true
        exhaustionCost: 1
        nextNodeId: read_the_letters
      - id: back_out
        label: This is too dangerous. Tell them to find another way.
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: -2
            axis: trust
        exhaustionCost: 0
        nextNodeId: null

  agreed_to_deliver:
    id: agreed_to_deliver
    text: >-
      {traveler.name} grips your arm. "You are braver than you look. The letters go to the miller's
      widow on the east road she will know what to do with them." They press a small coin into
      your palm. "And if anyone asks, you have not seen me."
    choices:
      - id: head_out_now
        label: Go deliver them immediately
        consequences:
          - type: faction
            target: village_folk
            value: 1
          - type: stat
            target: strength
            value: 1
        exhaustionCost: 2
        nextNodeId: null
      - id: wait_for_dark
        label: Wait until after dark to move less conspicuously
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: null

  read_the_letters:
    id: read_the_letters
    text: >-
      The letters are damning evidence of a local merchant trading information to a foreign power.
      Your hands are steady as you reseal them, but your mind is racing. You now know something
      dangerous. That changes things.
    choices:
      - id: use_knowledge
        label: Keep quiet for now knowledge like this has value
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: knows_merchant_secret
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: report_content
        label: This needs to go to the town guard immediately
        consequences:
          - type: faction
            target: town_guard
            value: 3
          - type: world_fact
            target: merchant_denounced
            value: true
        exhaustionCost: 2
        nextNodeId: null
