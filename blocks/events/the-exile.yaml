id: the_exile
name: The Exile
tags:
  - social
  - faction
  - intrigue

preconditions:
  - operator: or
    conditions:
      - type: world_fact
        key: accused_healer
        value: true
      - type: world_fact
        key: turned_in_deserter
        value: true

roles:
  - id: exile
    label: The Exiled Person
    archetypeFilter:
      - farmer
      - blacksmith
      - soldier
  - id: guard_captain
    label: The Guard Captain
    archetypeFilter:
      - soldier
    factionRequirements:
      - town_guard

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      A crowd has gathered at the north gate. {exile.name} stands in the road with a single
      pack, {guard_captain.name} behind them. The reading is brief and formal — conduct
      unbecoming, threat to the town's peace, banishment effective immediately. {exile.name}
      does not beg. They look once at the crowd, finding faces, remembering who was silent.
      Their eyes find yours. You know what came before this moment.
    choices:
      - id: witness_silently
        label: Stand and witness it without speaking
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: exile_witnessed
            value: true
        exhaustionCost: 0
        nextNodeId: witnessed
      - id: protest
        label: Step forward and formally protest the sentence
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: town_guard
            value: -2
          - type: relationship
            target: '{exile.id}'
            value: 3
            axis: trust
          - type: world_fact
            target: exile_protested
            value: true
        exhaustionCost: 2
        nextNodeId: protested
      - id: help_them_escape
        label: Slip to the back of the crowd and arrange a way out before the gate closes
        preconditions:
          - type: world_fact
            key: secret_exit_known
            value: true
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: relationship
            target: '{exile.id}'
            value: 3
            axis: trust
          - type: relationship_tag
            target: '{exile.id}'
            value: helped_escape_exile
          - type: faction
            target: town_guard
            value: -3
          - type: world_fact
            target: exile_helped_escape
            value: true
        exhaustionCost: 2
        nextNodeId: helped_escape

  witnessed:
    id: witnessed
    text: >-
      {exile.name} walks through the gate. {guard_captain.name} watches until they are
      gone, then turns back to the square. The crowd disperses. People do not meet each
      other's eyes. You stood and watched the town do something it will not examine closely
      afterward. That is its own kind of record.
    choices:
      - id: follow_to_gate
        label: Walk to the gate and watch until they are out of sight
        consequences:
          - type: relationship
            target: '{exile.id}'
            value: 1
            axis: trust
        exhaustionCost: 0
        nextNodeId: null
      - id: walk_away_first
        label: Walk away before they are through the gate
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  protested:
    id: protested
    text: >-
      {guard_captain.name} tells you the decision is final. You make your case anyway —
      loudly enough for the crowd to hear. {exile.name} does not look at you again, but
      their hands unclench slightly. It is not enough to stop anything. But it was said,
      and the crowd heard it, and {guard_captain.name} will remember your face.
    choices:
      - id: push_further
        label: Demand to know who brought the original complaint
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: town_guard
            value: -2
          - type: world_fact
            target: exile_complaint_investigated
            value: true
        exhaustionCost: 2
        nextNodeId: null
      - id: accept_defeat
        label: Stop when the captain steps toward you — it is over
        consequences:
          - type: faction
            target: village_folk
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  helped_escape:
    id: helped_escape
    text: >-
      You pass word through a boy you trust, who passes it to {exile.name}'s cousin.
      The route through the abandoned tannery and under the south wall is not comfortable
      but it works. {exile.name} is gone before the gate closes — but not through it.
      {guard_captain.name} counts heads afterward and comes up one short. They will
      look at you eventually.
    choices:
      - id: have_an_alibi
        label: Make sure you were seen elsewhere — someone can vouch for you
        preconditions:
          - type: trait
            key: cunning
            min: 4
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: faction
            target: town_guard
            value: -1
        exhaustionCost: 1
        nextNodeId: null
      - id: do_not_hide
        label: Do not hide it — if they ask, you will not lie
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: town_guard
            value: -3
        exhaustionCost: 1
        nextNodeId: null
