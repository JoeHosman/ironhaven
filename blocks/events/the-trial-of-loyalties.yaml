id: the-trial-of-loyalties
name: The Trial of Loyalties
tags:
  - social
  - intrigue
  - romance

preconditions: []

roles:
  - id: accused
    label: The Accused
    archetypeFilter:
      - merchant
      - blacksmith
      - healer
      - innkeeper
      - baker
  - id: accuser
    label: The Accuser
    archetypeFilter:
      - guard
      - noble
      - soldier
  - id: witness
    label: A Reluctant Witness
    archetypeFilter:
      - farmer
      - weaver
      - fisherman
      - stable-hand
  - id: judge
    label: The Magistrate
    archetypeFilter:
      - noble
      - scholar
      - priest

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      Morning light falls flat across the square. You are barely awake when the shouting
      begins — {accuser.name}'s voice cutting through the ordinary noise like a blade.
      A crowd forms fast, the way crowds do when there is something sharp to gather around.
      At the center: {accuser.name}, red-faced and righteous, dragging {accused.name}
      toward the steps where {judge.name} sits in a chair carried out for the purpose.
      The charge is already spreading mouth to mouth: theft from the town stores.
      Stealing grain during the shortage.
    choices:
      - id: watch
        label: Hang back and watch from the edge of the crowd
        consequences: []
        exhaustionCost: 1
        nextNodeId: watch_the_scene
      - id: push_forward
        label: Push through the crowd to get closer — you know {accused.name}
        consequences: []
        exhaustionCost: 1
        nextNodeId: watch_the_scene

  watch_the_scene:
    id: watch_the_scene
    text: >-
      {accused.name} is protesting — voice cracked, hands out, the posture of someone
      trying not to seem desperate and failing. {accuser.name} holds up a sack of grain
      and turns it in the air so the crowd can see the store mark stamped on the burlap.
      "Found in their home. In their cellar." The crowd murmurs and shifts. Some faces
      you recognize. Most of them are already deciding. {judge.name} sits very still,
      watching everything, giving nothing away.
    choices:
      - id: speak_for_accused
        label: Step forward — "I know {accused.name}. This is wrong."
        consequences:
          - type: relationship
            target: accused
            value: 2
            axis: trust
          - type: relationship
            target: accuser
            value: -1
            axis: trust
        exhaustionCost: 1
        nextNodeId: speak_for_accused
      - id: speak_for_accuser
        label: Nod along — the evidence is plain. Say so to the person beside you.
        consequences:
          - type: relationship
            target: accuser
            value: 1
            axis: trust
          - type: relationship
            target: accused
            value: -1
            axis: trust
        exhaustionCost: 1
        nextNodeId: speak_for_accuser
      - id: stay_silent
        label: Stay quiet and watch the crowd as much as the scene
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: stay_silent

  speak_for_accused:
    id: speak_for_accused
    text: >-
      You step forward and the crowd parts slightly, the way crowds do when someone
      commits to a position. "I know {accused.name}. They have lived in this town for
      years. They fed people during the last shortage, not stole from them." {accuser.name}
      turns to you with a look you will remember — patient, almost amused. "Then explain
      the grain," they say. "Explain the store mark. Explain why it was in their cellar."
      The crowd waits. {judge.name} is watching you now.
    choices:
      - id: hold_position
        label: "I cannot explain the grain. But I know this person. Something is wrong here."
        consequences:
          - type: relationship
            target: accused
            value: 1
            axis: trust
          - type: relationship
            target: judge
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: stay_silent
      - id: retreat_gracefully
        label: Falter — you have nothing to counter with. Step back.
        consequences:
          - type: relationship
            target: accused
            value: -1
            axis: trust
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: stay_silent

  speak_for_accuser:
    id: speak_for_accuser
    text: >-
      You agree with the man beside you, loudly enough for {accuser.name} to hear.
      They find you afterward in the press of bodies and grip your arm — grateful, warm,
      the handshake of someone collecting allies. "Good. The town needs people who can
      see clearly." You feel a small flush of satisfaction before something quieter
      asks whether clarity was what you were actually practicing.
    choices:
      - id: accept_gratitude
        label: Accept the gratitude. You said what you thought.
        consequences:
          - type: relationship
            target: accuser
            value: 1
            axis: trust
          - type: world_fact
            target: sided_with_accuser_publicly
            value: true
        exhaustionCost: 1
        nextNodeId: investigation_hub
      - id: feel_uncertain
        label: Pull away slightly — you are not sure you meant to be recruited.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: investigation_hub

  stay_silent:
    id: stay_silent
    text: >-
      You hold your ground and hold your tongue. {judge.name} calls for anyone with
      knowledge of the matter to come forward before the trial proper — which will be
      held at noon. The crowd begins to break apart, people taking their interpretations
      with them. As the square empties you see {witness.name} still standing near the
      well, not moving, arms wrapped around themselves despite the warmth of the morning.
      They look at you. It lasts a second longer than a stranger's glance would.
    choices:
      - id: approach_witness
        label: Walk toward {witness.name} — that look meant something
        consequences:
          - type: relationship
            target: witness
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: approach_witness
      - id: go_investigate
        label: You need facts before you need conversation. Go look at the stores.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: investigation_hub

  approach_witness:
    id: approach_witness
    text: >-
      {witness.name} does not run, but they hold themselves very still as you close
      the distance, the way an animal stays still hoping not to be seen. When you are
      close enough to speak quietly, they speak first — barely above a breath. "I saw
      something that night. What they said about {accused.name}." A pause. They look
      at the ground, then back at you. "It wasn't them. But I cannot say it here.
      Not in the open. Not where people would hear who said it."
    choices:
      - id: press_witness_now
        label: "Then say it to me. Just me. Right now."
        consequences:
          - type: relationship
            target: witness
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: witness_afraid
      - id: give_witness_space
        label: Nod slowly. "All right. I will find you privately."
        consequences:
          - type: relationship
            target: witness
            value: 2
            axis: trust
        exhaustionCost: 1
        nextNodeId: investigation_hub

  witness_afraid:
    id: witness_afraid
    text: >-
      {witness.name} shakes their head and takes a small step back. "My family works
      the guard rotation schedule. Three of us. If I open my mouth and {accuser.name}
      hears about it — and they will — that ends." They say it flatly, the way someone
      describes weather. Not a threat, just a fact they have been carrying for hours.
      "I am not a coward. I just need it to matter if I speak. I need to know
      someone will do something with what I say."
    choices:
      - id: promise_witness
        label: "I will do something with it. I promise you that."
        consequences:
          - type: relationship
            target: witness
            value: 2
            axis: trust
          - type: world_fact
            target: promised_witness
            value: true
        exhaustionCost: 1
        nextNodeId: find_witness_privately
      - id: cannot_promise
        label: You cannot promise that. You say nothing.
        consequences:
          - type: relationship
            target: witness
            value: -1
            axis: trust
        exhaustionCost: 1
        nextNodeId: investigation_hub

  investigation_hub:
    id: investigation_hub
    text: >-
      The morning moves toward noon. The trial will happen whether you are ready or not.
      You have time for two or three more threads before {judge.name} convenes the square.
      {accused.name} is being held at the back of the guard post. The town stores are
      unlocked and accessible. {witness.name} can be found at the church if you look.
      {accuser.name} is visible near the square, accepting the handshakes of people
      who have already decided. The grain sack evidence is sitting on the magistrate's
      table unattended.
    choices:
      - id: talk_to_accused_choice
        label: Go to the guard post and speak with {accused.name}
        consequences: []
        exhaustionCost: 1
        nextNodeId: talk_to_accused
      - id: investigate_stores_choice
        label: Go examine the town stores
        consequences: []
        exhaustionCost: 1
        nextNodeId: investigate_stores
      - id: find_witness_choice
        label: Find {witness.name} behind the church
        consequences: []
        exhaustionCost: 1
        nextNodeId: find_witness_privately
      - id: talk_to_accuser_choice
        label: Approach {accuser.name} — gauge them directly
        consequences: []
        exhaustionCost: 1
        nextNodeId: confront_accuser
      - id: examine_evidence_choice
        label: Examine the grain sack on the magistrate's table
        consequences: []
        exhaustionCost: 1
        nextNodeId: examine_evidence

  talk_to_accused:
    id: talk_to_accused
    text: >-
      The guard post smells of woodsmoke and old boots. {accused.name} is sitting
      against the back wall on a bench worn smooth by years of people sitting on it
      in exactly this kind of trouble. They look up when you enter — something shifts
      in their face, hope or the fear of hope, it is hard to tell the difference.
      "I was at home that night. Alone." They say it like a confession, knowing
      how it sounds. "I have no proof of that. I know how that sounds."
    choices:
      - id: believe_them
        label: "I believe you. Was there anything else? Anything you noticed?"
        consequences:
          - type: relationship
            target: accused
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: accused_opens_up
      - id: stay_neutral
        label: "I need to understand what happened. Walk me through the night."
        consequences: []
        exhaustionCost: 1
        nextNodeId: accused_opens_up
      - id: push_harder_on_accused
        label: "The evidence is what it is. Tell me something I can use, or I cannot help you."
        consequences:
          - type: relationship
            target: accused
            value: -1
            axis: trust
        exhaustionCost: 1
        nextNodeId: accused_opens_up

  accused_opens_up:
    id: accused_opens_up
    text: >-
      {accused.name} is quiet for a moment, and then: "There is something. I did not
      mention it because it sounds like nothing." They pull at a loose thread on their
      sleeve. "I heard {accuser.name} outside my window that night. Late — after the
      second bell. Moving something. I thought they were on patrol. I thought it was
      crates being shifted at the store. I thought it was nothing." They look at you.
      "I should have looked. I did not look." The silence that follows is the exact
      shape of hindsight.
    choices:
      - id: note_accuser_timing
        label: Thank them and go — that timing matters.
        consequences:
          - type: world_fact
            target: accused_heard_accuser
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: investigation_hub
      - id: ask_about_guilt
        label: Ask the question you have been sitting with — "Have you ever taken anything? Even small?"
        consequences:
          - type: relationship
            target: accused
            value: -1
            axis: trust
        exhaustionCost: 1
        nextNodeId: accused_admission

  accused_admission:
    id: accused_admission
    text: >-
      The pause is too long to mean nothing. "Once," {accused.name} says. "A year ago.
      A small amount, during the fever season. My children were hungry and I told myself
      I would replace it." Another pause. "I replaced it. But I did take it." They
      meet your eyes without flinching. "I know what that means for how you see this.
      But I did not steal this grain. Not this time. And I will not confess to
      something I did not do just because I did something else once."
    choices:
      - id: respect_admission
        label: "I hear you. That took something to tell me."
        consequences:
          - type: relationship
            target: accused
            value: 2
            axis: trust
          - type: world_fact
            target: accused_admitted_past_theft
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: investigation_hub
      - id: judge_admission
        label: Step back — you are not sure what to do with that.
        consequences:
          - type: relationship
            target: accused
            value: -1
            axis: trust
          - type: world_fact
            target: accused_admitted_past_theft
            value: true
        exhaustionCost: 1
        nextNodeId: investigation_hub

  investigate_stores:
    id: investigate_stores
    text: >-
      The town stores are a long, low building with thick walls built to keep cool.
      The door is open — a guard waved you in when you explained you were looking
      into things. Inside: grain bins, salt barrels, cured meat hanging from hooks.
      You go to the door itself and crouch down. The lock is intact. No damage, no
      gouge marks, no sign of forcing. Whoever opened this used a key.
    choices:
      - id: ask_about_keys
        label: Ask the guard who holds the keys to this store
        consequences:
          - type: world_fact
            target: investigated_stores
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: who_has_keys
      - id: look_around_more
        label: Keep looking before you talk to anyone — check the bins, the floor
        consequences:
          - type: world_fact
            target: investigated_stores
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 2
        nextNodeId: who_has_keys

  who_has_keys:
    id: who_has_keys
    text: >-
      The guard thinks about it, then counts on their fingers. "The storekeeper has one.
      {accuser.name} holds one as part of the guard post responsibility. And {judge.name}
      has the third, kept at the magistrate's office." They seem to register what that
      means a beat after they say it. You thank them and give them nothing to read in
      your face. Three keys. One of them opened that lock. {accused.name} was not
      on the list.
    choices:
      - id: note_keys_and_go
        label: File it away. This changes things.
        consequences:
          - type: world_fact
            target: knows_key_holders
            value: true
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 1
        nextNodeId: investigation_hub
      - id: ask_guard_about_accuser
        label: Ask the guard, casually, whether {accuser.name} was on duty the night in question
        consequences:
          - type: world_fact
            target: knows_key_holders
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: investigation_hub

  find_witness_privately:
    id: find_witness_privately
    text: >-
      Behind the church is a narrow space between the building and the cemetery wall,
      out of sightline of the square. {witness.name} is already there when you arrive,
      which tells you they have been thinking about this meeting since the well.
      They speak without preamble. "I saw {accuser.name} carrying a sack from the
      direction of the stores to the lane behind {accused.name}'s house. Before dawn.
      I could not sleep. I was at the window." They say it steadily. "It was the
      same sack. I know the mark on it. I have bought from those stores."
    choices:
      - id: ask_witness_to_testify
        label: "Will you say this at the trial? In front of {judge.name}?"
        consequences:
          - type: relationship
            target: witness
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: witness_refuses_at_first
      - id: thank_witness_carefully
        label: Thank them and ask them to stay quiet for now — you need to think
        consequences:
          - type: world_fact
            target: witness_told_player
            value: true
        exhaustionCost: 1
        nextNodeId: investigation_hub

  witness_refuses_at_first:
    id: witness_refuses_at_first
    text: >-
      {witness.name} closes their eyes for a moment. "I want to. I keep telling myself
      I should." They open them again. "But {accuser.name} controls who gets put on the
      harvest detail. My son is eighteen. He needs that work. If I stand up in that
      square and point my finger and nothing comes of it —" They stop. They do not
      finish the sentence. They do not need to. The consequences of failure are a
      thing they have already mapped out in full.
    choices:
      - id: convince_witness
        label: "I will make sure something comes of it. I have evidence. You are not alone."
        consequences:
          - type: relationship
            target: witness
            value: 2
            axis: trust
          - type: world_fact
            target: witness_told_player
            value: true
          - type: world_fact
            target: witness_convinced
            value: true
        exhaustionCost: 2
        nextNodeId: investigation_hub
      - id: respect_witness_fear
        label: "Then do not. I will find another way."
        consequences:
          - type: relationship
            target: witness
            value: 1
            axis: trust
          - type: world_fact
            target: witness_told_player
            value: true
        exhaustionCost: 1
        nextNodeId: investigation_hub

  examine_evidence:
    id: examine_evidence
    text: >-
      The grain sack sits on the edge of the magistrate's table, alone in the way that
      pieces of evidence are always alone — suddenly significant, loaded with meaning
      they did not have an hour ago. You pick it up. Turn it. The store mark is clear.
      Then something else: near the bottom of the burlap, a smudge pressed into the
      weave. It took a moment to read. A seal impression — partial, blurred, but the
      shape is there. A ring pressed into wet grain dust. The shape of it matches the
      kind of ring a guard officer wears on their right hand.
    choices:
      - id: note_seal_quietly
        label: Set the sack down carefully and take nothing. File what you saw.
        consequences:
          - type: world_fact
            target: found_seal_impression
            value: true
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 1
        nextNodeId: investigation_hub
      - id: take_sack_to_judge
        label: Take the sack directly to {judge.name} right now — before the trial
        consequences:
          - type: world_fact
            target: found_seal_impression
            value: true
          - type: relationship
            target: judge
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: investigation_hub

  confront_accuser:
    id: confront_accuser
    text: >-
      {accuser.name} is in the square near the well, receiving the quiet approval of
      people who feel that order has been defended. When you approach, they turn with
      the ease of someone who is used to being approached for good reasons. The ease
      falters slightly when they read your expression. You do not give them a greeting.
      You give them: "I know about the keys. I know about the grain sack. I know you
      were outside that window." You watch the ease finish faltering.
    choices:
      - id: accuser_threatens
        label: Wait and let them respond first
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: accuser_threatens
      - id: push_for_confession
        label: "Tell me why. Not what happened. Why."
        consequences:
          - type: relationship
            target: accuser
            value: -2
            axis: trust
        exhaustionCost: 2
        nextNodeId: accuser_threatens

  accuser_threatens:
    id: accuser_threatens
    text: >-
      {accuser.name} moves closer — not aggressive, just intimate, the way a person
      stands when they want a conversation to stay between two people. "You are making
      an accusation about a guard officer," they say, "based on what? Someone told
      you something? You found something you think you understand?" The ease is back,
      but it is a different kind of ease now. Harder underneath. "Think carefully
      about who this town is going to believe when this is over. Think about
      what it costs to be wrong about someone like me."
    choices:
      - id: accuser_offers_deal
        label: Stand your ground. Say nothing. Wait.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: accuser_offers_deal
      - id: reject_threat
        label: "I am not making a threat. I am telling you what I know."
        consequences:
          - type: relationship
            target: accuser
            value: -1
            axis: trust
          - type: world_fact
            target: accuser_threatened_player
            value: true
        exhaustionCost: 1
        nextNodeId: accuser_offers_deal

  accuser_offers_deal:
    id: accuser_offers_deal
    text: >-
      Something shifts in {accuser.name}'s posture — a fraction. The calculation
      behind the eyes. "Look," they say, voice dropping further. "I will be honest with
      you. {accused.name} is not innocent. They have been light-fingered with the stores
      for over a year. Small amounts. Nothing anyone would move on." A pause. "The
      evidence was arranged. I will grant you that. But the guilt is real. I just
      made sure the proof existed. Is that not what justice requires — that the guilty
      face consequences?"
    choices:
      - id: accept_accusers_logic
        label: Consider it — there is a version of this where they have a point
        consequences:
          - type: world_fact
            target: considered_accusers_logic
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: accept_accusers_logic
      - id: reject_accuser
        label: "Planted evidence is not justice. Process is not a technicality."
        consequences:
          - type: relationship
            target: accuser
            value: -2
            axis: trust
          - type: world_fact
            target: rejected_accusers_deal
            value: true
        exhaustionCost: 1
        nextNodeId: reject_accuser
      - id: dig_deeper_motive
        label: "Why {accused.name} specifically? Why now? What is this really about?"
        consequences:
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 2
        nextNodeId: dig_deeper

  accept_accusers_logic:
    id: accept_accusers_logic
    text: >-
      You stand with it. The guilty facing consequences. The outcome correct even if
      the path was not. There is a version of this that holds together — a pragmatic
      version, the kind of justice that actually works in the world as it exists rather
      than the world as it should be. You are not certain it is wrong. You are not
      certain it is right either. The trial is in two hours and you are standing in the
      square with the weight of it settling into your shoulders.
    choices:
      - id: go_along
        label: Let it stand. You will not intervene.
        consequences:
          - type: world_fact
            target: chose_to_stay_silent
            value: true
          - type: relationship
            target: accuser
            value: 1
            axis: trust
          - type: relationship
            target: accused
            value: -2
            axis: trust
        exhaustionCost: 1
        nextNodeId: trial_begins
      - id: reconsider
        label: No. You need to know the whole of it before you decide anything.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: dig_deeper

  reject_accuser:
    id: reject_accuser
    text: >-
      {accuser.name} looks at you for a long moment. The warm calculation fades.
      What replaces it is not anger — something more measured, more patient.
      "You are going to regret this," they say, and it is not quite a threat — it is
      a prediction, offered with the confidence of someone who has been in this town
      long enough to know how it works. They turn and walk away before you can answer.
      The trial is in two hours. They will be ready. The question is whether you will be.
    choices:
      - id: prepare_for_trial
        label: Go prepare. Gather what you have. Get to the trial.
        consequences:
          - type: world_fact
            target: confronted_accuser
            value: true
        exhaustionCost: 1
        nextNodeId: trial_begins
      - id: dig_deeper_after_rejection
        label: There is still something you are missing. Dig deeper before the trial.
        consequences:
          - type: world_fact
            target: confronted_accuser
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: dig_deeper

  dig_deeper:
    id: dig_deeper
    text: >-
      You start asking quieter questions to quieter people. The baker who supplies
      the guard post. The old man who sits near the gate and watches. The woman who
      keeps the guild hall ledger. A picture assembles itself slowly, like a fog lifting
      without you noticing until you can see clearly. {accuser.name} has been collecting
      supplementary fees from merchants for two seasons. Not large. Never large enough
      to move on. But consistent. And {accused.name} stopped paying three months ago.
    choices:
      - id: discover_motive
        label: Follow the thread all the way — you need to know who else is involved
        consequences:
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 2
        nextNodeId: discover_motive
      - id: have_enough
        label: You have enough. The trial is starting.
        consequences:
          - type: world_fact
            target: knows_protection_racket
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: trial_begins

  discover_motive:
    id: discover_motive
    text: >-
      The ledger woman is the one who makes it complete. She shows you, without comment,
      three pages of entries in a secondary column — supplementary collections, marked
      with initials. She shows you where {accused.name}'s initials stop appearing.
      She shows you the date. She does not say what it means. She closes the ledger.
      "I have shown you nothing," she says. "If anyone asks, I showed you nothing."
      This was never about grain. It was about what happens when someone decides to
      stop paying for peace.
    choices:
      - id: the_real_crime
        label: You understand now. All of it.
        consequences:
          - type: world_fact
            target: knows_protection_racket
            value: true
          - type: world_fact
            target: knows_full_motive
            value: true
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 1
        nextNodeId: the_real_crime

  the_real_crime:
    id: the_real_crime
    text: >-
      This is not a theft trial. It is a message. {accuser.name} found a way to punish
      {accused.name} for refusing to pay, and they found a way to make the punishment
      look like justice. If it works — if {accused.name} is convicted — every other
      merchant in town will know what happens to people who stop cooperating. The grain
      sack is not evidence of a crime. It is a demonstration of power. And {judge.name}
      is about to give it a verdict.
    choices:
      - id: go_to_trial_knowing
        label: Go to the trial. You know what you are going to say.
        consequences:
          - type: world_fact
            target: knows_full_picture
            value: true
        exhaustionCost: 1
        nextNodeId: trial_begins

  trial_begins:
    id: trial_begins
    text: >-
      Noon. The square fills again, more formally this time — people arranged in a
      loose arc around the magistrate's table, {judge.name} standing behind it.
      {accused.name} stands to one side, pale and very still. {accuser.name} stands
      opposite, composed, the grain sack on the table between them. {judge.name}
      calls for order and gets it. They ask if anyone has evidence or testimony
      to present before they proceed. The square is quiet. Everyone turns, almost as
      one, and looks at you.
    choices:
      - id: present_full_truth_choice
        label: Step forward. Present everything — evidence, motive, the protection racket.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 3
        nextNodeId: present_full_truth
      - id: present_partial_truth_choice
        label: Step forward. Present the planted evidence — but leave the rest out.
        consequences: []
        exhaustionCost: 2
        nextNodeId: present_partial_truth
      - id: stay_silent_at_trial_choice
        label: Say nothing. Let it proceed.
        consequences:
          - type: world_fact
            target: stayed_silent_at_trial
            value: true
          - type: relationship
            target: accused
            value: -3
            axis: trust
          - type: relationship
            target: witness
            value: -1
            axis: trust
        exhaustionCost: 1
        nextNodeId: stay_silent_at_trial

  present_full_truth:
    id: present_full_truth
    text: >-
      You lay it out piece by piece. The lock that showed no forcing. The three key
      holders — none of them {accused.name}. The seal impression on the burlap.
      The ledger entries and the date they stop. What {witness.name} saw before dawn.
      The supplementary fees and who collected them. You speak steadily and you do not
      look at {accuser.name} because if you look at them you might stop. When you
      finish, the square is completely silent. {judge.name} has not moved. {accuser.name}
      has gone the color of old ash.
    choices:
      - id: witness_testifies_after_full
        label: Look at {witness.name} in the crowd — the moment is now, if they are going to take it
        consequences:
          - type: relationship
            target: witness
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: witness_testifies
      - id: let_evidence_stand
        label: You have said everything. Let the evidence stand on its own.
        consequences:
          - type: world_fact
            target: presented_full_truth
            value: true
        exhaustionCost: 1
        nextNodeId: accuser_breaks

  present_partial_truth:
    id: present_partial_truth
    text: >-
      You speak to the lock. The key holders. The seal impression. You do not mention
      the ledger, the fees, the pattern that connects this moment to a longer cruelty.
      You give {judge.name} enough to call the evidence into question — enough to
      create reasonable doubt — but you stop short of the thing that would end
      {accuser.name} completely. A compromise you will have to decide whether you
      made for good reasons or convenient ones.
    choices:
      - id: witness_testifies_after_partial
        label: Catch {witness.name}'s eye — they can fill in what you left out
        consequences:
          - type: relationship
            target: witness
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: witness_testifies
      - id: let_partial_stand
        label: Leave it there. You said what you said.
        consequences:
          - type: world_fact
            target: presented_partial_truth
            value: true
          - type: world_fact
            target: protection_racket_concealed
            value: true
        exhaustionCost: 1
        nextNodeId: judge_deliberates

  stay_silent_at_trial:
    id: stay_silent_at_trial
    text: >-
      You do not step forward. The moment passes. {judge.name} nods once and begins
      presenting the evidence as submitted — the grain sack, the store mark, the
      testimony of {accuser.name} who found it. The trial that follows is brief, the way
      trials are when the evidence only goes one direction. {witness.name} catches your
      eye once from across the square. You look away first. Some things you do not
      have the courage to see all the way.
    choices:
      - id: accused_convicted_path
        label: Watch it reach its conclusion
        consequences:
          - type: world_fact
            target: stayed_silent_at_trial
            value: true
        exhaustionCost: 1
        nextNodeId: accused_convicted

  witness_testifies:
    id: witness_testifies
    text: >-
      {witness.name} steps forward. They move through the crowd with the careful walk
      of someone who has decided something and is not allowing themselves to think about
      it too carefully or they will stop. They stand beside you. They do not look at
      {accuser.name} when they speak — they look at {judge.name}. They describe what
      they saw before dawn, in their own words, in the voice of someone who is frightened
      and doing it anyway. When they finish, {accuser.name} starts to speak. {judge.name}
      holds up a hand. {accuser.name} stops.
    choices:
      - id: accuser_breaks_after_witness
        label: Watch {accuser.name}'s composure reach its limit
        consequences:
          - type: world_fact
            target: witness_testified
            value: true
          - type: relationship
            target: witness
            value: 2
            axis: trust
          - type: relationship
            target: accuser
            value: -2
            axis: trust
        exhaustionCost: 1
        nextNodeId: accuser_breaks

  accuser_breaks:
    id: accuser_breaks
    text: >-
      {accuser.name} holds it together for thirty seconds. Then: "The evidence was
      placed, yes. But {accused.name} is still a thief. That is still true." The words
      fall into the silence of the square like stones into still water. Admission and
      accusation in the same breath. {judge.name}'s expression does not change but
      something behind their eyes does — the final calculation completing. The town
      is very quiet. Everyone is waiting to learn what kind of place they live in.
    choices:
      - id: judge_deliberates_choice
        label: Wait for {judge.name} to deliberate
        consequences:
          - type: world_fact
            target: accuser_admitted_planting
            value: true
          - type: relationship
            target: accuser
            value: -3
            axis: trust
        exhaustionCost: 1
        nextNodeId: judge_deliberates

  judge_deliberates:
    id: judge_deliberates
    text: >-
      {judge.name} is still for a long moment. When they speak, they speak carefully —
      the way someone speaks when they know the words will be repeated and they want
      them repeated accurately. "Evidence obtained through deception cannot stand.
      This court does not concern itself with what a person may have done in some
      other time and place — only with what is proven here, today." They look at
      {accuser.name}. "That is not a protection of the guilty. It is a protection of
      all of us." The verdict will follow. Its shape depends on what you brought.
    choices:
      - id: accused_freed_path
        label: The evidence is clear. {accused.name} will go free.
        consequences:
          - type: world_fact
            target: judge_ruled_fairly
            value: true
        exhaustionCost: 1
        nextNodeId: justice_served
      - id: accused_convicted_partial
        label: "{judge.name} looks uncertain — the partial truth left room for doubt"
        consequences:
          - type: world_fact
            target: judge_compromised
            value: true
        exhaustionCost: 1
        nextNodeId: compromise_reached

  accused_convicted:
    id: accused_convicted
    text: >-
      The verdict is guilty. {accused.name} receives it standing up, which takes more
      than you gave them credit for. They are to be exiled — given until morning to
      leave the town. As they are led away, they find you in the crowd. The look they
      give you is not hatred. It is something harder to carry than hatred. It is the
      look of someone who expected something from you and is adjusting that expectation
      downward to fit what actually happened. You will carry it for a while.
    choices:
      - id: aftermath_after_conviction
        label: The trial is over. Face what comes next.
        consequences:
          - type: world_fact
            target: accused_convicted
            value: true
          - type: relationship
            target: accused
            value: -3
            axis: trust
          - type: relationship
            target: accused
            value: false
            axis: ally
          - type: relationship
            target: accused
            value: true
            axis: betrayed
        exhaustionCost: 1
        nextNodeId: aftermath_hub

  justice_served:
    id: justice_served
    text: >-
      {accused.name} is free. The words are simple and the reality is complicated, the
      way freedom always is when it comes at a cost to someone else. {accuser.name} is
      stripped of their guard rank before the square has finished processing what happened
      — {judge.name} moves quickly when they move. The guard unit shuffles. People
      are recalibrating. You have made an enemy who was, until this morning,
      a respected officer of the town. You know it and you stand with it.
    choices:
      - id: aftermath_after_justice
        label: Go. Let the town absorb it.
        consequences:
          - type: world_fact
            target: accused_freed
            value: true
          - type: world_fact
            target: accuser_exposed
            value: true
          - type: relationship
            target: accused
            value: 3
            axis: trust
          - type: relationship
            target: accused
            value: true
            axis: ally
          - type: relationship
            target: accuser
            value: true
            axis: enemy
          - type: relationship
            target: judge
            value: 2
            axis: trust
        exhaustionCost: 1
        nextNodeId: aftermath_hub

  compromise_reached:
    id: compromise_reached
    text: >-
      {accused.name} is freed with a formal warning and the cloud of the accusation
      still hanging over them — not convicted, but not vindicated either. {accuser.name}
      is quietly reassigned to a post outside the town walls. The ledger entries are
      not mentioned. The protection racket is not named. Everyone who knows about it
      knows that everyone else knows about it, and nothing is said. The town functions.
      Nobody is entirely satisfied, including you.
    choices:
      - id: aftermath_after_compromise
        label: Accept the shape of what happened.
        consequences:
          - type: world_fact
            target: accused_freed
            value: true
          - type: world_fact
            target: accuser_reassigned
            value: true
          - type: world_fact
            target: protection_racket_concealed
            value: true
          - type: relationship
            target: accused
            value: 1
            axis: trust
          - type: relationship
            target: accuser
            value: -1
            axis: trust
        exhaustionCost: 1
        nextNodeId: aftermath_hub

  aftermath_hub:
    id: aftermath_hub
    text: >-
      The square is empty in the way squares are after something has happened in them.
      Stalls are still shuttered. People have gone home to decide how they feel about
      what they saw. The trial is over and the town is the same and different at once.
      There are still people to find. Things that were said during the day that have
      not finished being said.
    choices:
      - id: witness_gratitude_choice
        label: Find {witness.name} — they went home after the square cleared
        consequences: []
        exhaustionCost: 1
        nextNodeId: witness_gratitude
      - id: accuser_revenge_choice
        label: Take stock of your surroundings — the day does not feel finished
        consequences: []
        exhaustionCost: 1
        nextNodeId: accuser_revenge
      - id: reflection_choice
        label: Go home. Write it down.
        consequences: []
        exhaustionCost: 1
        nextNodeId: reflection

  witness_gratitude:
    id: witness_gratitude
    text: >-
      You find {witness.name} in the lane outside their house, sitting on the step
      with their hands on their knees. They look up when you approach. "I keep waiting
      to feel better," they say. "I thought it would feel better than this." They pause.
      "It does not feel bad. It is just — different than I expected." You sit with them
      for a while. You do not have to say much. Some days the company is the thing,
      not the words. When you leave, they call after you. "Thank you. For being someone
      I could tell." You carry that differently than you carry most things.
    choices:
      - id: to_reflection_from_witness
        label: Go home. The day is long enough.
        consequences:
          - type: relationship
            target: witness
            value: 2
            axis: trust
          - type: relationship
            target: witness
            value: true
            axis: ally
          - type: world_fact
            target: witness_gratitude_received
            value: true
        exhaustionCost: 1
        nextNodeId: reflection

  innocent_condemned:
    id: innocent_condemned
    text: >-
      You know the truth and you did not speak it. That is the fact of today.
      {accused.name} is gone before morning comes, taking what they could carry
      and leaving what they could not. {witness.name} saw you in the square.
      Saw you not step forward. They will not forget that. You are not sure you
      deserve them to. You have spent the evening telling yourself the reasons
      why you made the choice you made. Some of them are even true.
    choices:
      - id: to_reflection_from_condemned
        label: Write it down. Do not smooth it out.
        consequences:
          - type: world_fact
            target: innocent_condemned
            value: true
          - type: relationship
            target: accused
            value: true
            axis: betrayed
          - type: relationship
            target: witness
            value: -2
            axis: trust
        exhaustionCost: 1
        nextNodeId: reflection

  accuser_revenge:
    id: accuser_revenge
    text: >-
      Three days after the trial, you notice it: the same person appearing at the
      edge of your peripheral vision twice in a morning. A figure who stops doing
      something when you look. Nothing certain, nothing you could name to {judge.name}.
      {accuser.name} is gone from their post but not gone from the town, and they
      have had three days to decide what they think of you. You are not afraid exactly.
      But you are paying a different kind of attention to the spaces behind you
      than you were paying before the trial.
    choices:
      - id: to_reflection_from_revenge
        label: Make a note of it and go home.
        consequences:
          - type: world_fact
            target: accuser_watching_player
            value: true
          - type: relationship
            target: accuser
            value: true
            axis: enemy
        exhaustionCost: 1
        nextNodeId: reflection

  reflection:
    id: reflection
    text: >-
      The journal entry writes itself the way the honest ones always do — the hand
      moving faster than the editing instinct, getting it down before the comfortable
      version sets in. You write what happened and what you did and what you did not do.
      You write what {accused.name}'s face looked like. What {witness.name}'s voice
      sounded like when they decided to step forward anyway. What {accuser.name}'s
      expression was when the ease left it. You write: this town is held together by
      the choices people make when they are frightened. You close the journal. The
      town is still there outside the window, going about its evening. It does not
      know what you wrote. It does not need to.
    choices:
      - id: end
        label: Close the journal.
        consequences:
          - type: world_fact
            target: trial_occurred
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
