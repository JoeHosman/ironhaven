id: secret_alliance
name: The Secret Alliance
tags:
  - intrigue
  - faction
  - social

preconditions:
  - operator: or
    conditions:
      - type: world_fact
        key: guild_conflict_resolved
        value: true
      - type: world_fact
        key: testified_truthfully
        value: true

roles:
  - id: conspirator
    label: A Quiet Conspirator
    archetypeFilter:
      - merchant
      - blacksmith
    traitRequirements:
      cunning:
        min: 5

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      {conspirator.name} catches you alone at the end of the day — in the alley behind the
      forge, or at the back of the empty hall. Their voice is low. "A few of us have been
      talking. About who actually runs this town. The guild masters. The magistrate.
      The same families making the same decisions for thirty years." They pause. "We think
      it is time that changed. And we think you are someone who could be part of it."
    choices:
      - id: listen_fully
        label: Tell them to keep talking — you want to hear the whole plan
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{conspirator.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: secret_alliance_known
            value: true
        exhaustionCost: 1
        nextNodeId: listened
      - id: ask_for_details
        label: Ask who else is involved before committing to anything
        consequences:
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 1
        nextNodeId: asked_details
      - id: decline
        label: Thank them but decline — you do not work in the shadows
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{conspirator.id}'
            value: -1
            axis: rivalry
        exhaustionCost: 0
        nextNodeId: declined

  listened:
    id: listened
    text: >-
      The plan is ambitious and not entirely reckless. A network of craftsmen, a few merchants,
      one sympathetic guard captain. They want to shift who controls the supply contracts,
      the trade levies, the appointment of guild representatives. Not a coup — a rerouting.
      {conspirator.name} watches you process it. "We need someone people trust," they say.
      "Someone not already known as a player."
    choices:
      - id: join_the_alliance
        label: Agree to join — the cause is real and so is the opportunity
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: 2
            axis: trust
          - type: faction
            target: craftsmen_guild
            value: 2
          - type: faction
            target: nobility
            value: -1
          - type: world_fact
            target: joined_secret_alliance
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: ask_for_time
        label: Tell them you need two days to think
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null

  asked_details:
    id: asked_details
    text: >-
      {conspirator.name} names three names — a senior craftsman, a young guard lieutenant,
      a merchant with cross-guild connections. Real people you know. Good people, mostly.
      But also people whose trust would be expensive to burn. You have what you need to
      decide, or to do something else with what you know.
    choices:
      - id: join_armed_with_names
        label: Join, knowing who the other players are
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: 1
            axis: trust
          - type: world_fact
            target: joined_secret_alliance
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: use_names_as_leverage
        label: Take the names to the magistrate — this is leverage worth having
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: faction
            target: nobility
            value: 2
          - type: relationship
            target: '{conspirator.id}'
            value: -3
            axis: rivalry
          - type: world_fact
            target: alliance_betrayed
            value: true
        exhaustionCost: 1
        nextNodeId: null

  declined:
    id: declined
    text: >-
      {conspirator.name} studies you for a moment. "All right," they say. "I hope I have
      not misjudged you." They walk away without another word. What they mean is: they hope
      you will not tell anyone. That is a different thing from trust.
    choices:
      - id: assure_silence
        label: Call after them — their secret is safe
        consequences:
          - type: relationship
            target: '{conspirator.id}'
            value: 1
            axis: trust
        exhaustionCost: 0
        nextNodeId: null
      - id: say_nothing
        label: Say nothing. Your silence is your answer.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
