id: forging_commission
name: The Noble's Commission
tags:
  - crafting
  - social
  - trade

preconditions:
  - type: archetype
    key: archetype
    value: blacksmith

roles:
  - id: noble
    label: A Visiting Noble
    traitRequirements:
      charisma:
        min: 4

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      {noble.name} arrives at your workshop door with two attendants and a folded drawing.
      They unroll it on your workbench without asking — a ceremonial blade, long and complex,
      with inlaid knotwork along the fuller and a lion-head pommel. "I want this done in two
      weeks," they say. "In the best steel you can source. The price is negotiable — within
      reason." Their tone suggests reason has narrow limits.
    choices:
      - id: accept_challenge
        label: Accept the commission — the work will be difficult but worth it
        consequences:
          - type: stat
            target: strength
            value: 1
          - type: faction
            target: nobility
            value: 2
          - type: relationship
            target: '{noble.id}'
            value: 2
            axis: respect
          - type: world_fact
            target: noble_commission_accepted
            value: true
        exhaustionCost: 1
        nextNodeId: accepted
      - id: negotiate_terms
        label: Negotiate — two weeks is too short, and you need better materials
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: world_fact
            target: noble_commission_accepted
            value: true
        exhaustionCost: 2
        nextNodeId: negotiated
      - id: refuse
        label: Decline — you work on your own terms, not a lord's schedule
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: faction
            target: nobility
            value: -1
          - type: relationship
            target: '{noble.id}'
            value: -2
            axis: rivalry
        exhaustionCost: 0
        nextNodeId: refused

  accepted:
    id: accepted
    text: >-
      {noble.name} rolls the drawing back up and slides it across to you. "Good. I expect
      updates." They leave without further ceremony. You study the drawing alone. The knotwork
      alone will take three days. The steel will need to be the best you have. Your hands
      are already planning.
    choices:
      - id: start_immediately
        label: Clear your workbench and begin the steel that same afternoon
        consequences:
          - type: stat
            target: strength
            value: 2
          - type: world_fact
            target: commission_in_progress
            value: true
        exhaustionCost: 3
        nextNodeId: null
      - id: source_materials_first
        label: Spend the day sourcing better materials before you begin
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: commission_in_progress
            value: true
        exhaustionCost: 2
        nextNodeId: null

  negotiated:
    id: negotiated
    text: >-
      {noble.name} listens to your conditions with a look that mixes irritation and grudging
      respect. Three weeks. Better materials sourced at their expense. A partial payment now.
      They agree to all of it, but their eyes say they are testing you. "Do not disappoint
      me," they say. It sounds like both a warning and an invitation.
    choices:
      - id: begin_with_confidence
        label: Begin immediately — you have earned better terms, now earn the result
        consequences:
          - type: stat
            target: strength
            value: 1
          - type: relationship
            target: '{noble.id}'
            value: 1
            axis: respect
          - type: world_fact
            target: commission_in_progress
            value: true
        exhaustionCost: 2
        nextNodeId: null
      - id: take_advance_and_plan
        label: Take the advance payment and plan carefully before lifting a hammer
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: commission_in_progress
            value: true
        exhaustionCost: 1
        nextNodeId: null

  refused:
    id: refused
    text: >-
      {noble.name} goes very still. Their attendants shift. Then the noble nods once, slowly.
      "I see." They roll up the drawing. "Perhaps I will find a craftsman who values reputation
      over pride." They walk out. One of the attendants glances back at you with something
      between sympathy and admiration.
    choices:
      - id: call_after
        label: Call after them — offer a counteroffer before they reach the door
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: nobility
            value: 1
          - type: world_fact
            target: noble_commission_accepted
            value: true
        exhaustionCost: 2
        nextNodeId: null
      - id: let_them_go
        label: Let them go. Your pride is worth something.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
