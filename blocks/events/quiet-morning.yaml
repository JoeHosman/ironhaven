id: quiet_morning
name: A Quiet Morning
tags:
  - social
  - exploration

preconditions: []

roles:
  - id: neighbor
    label: A Neighbor
    archetypeFilter:
      - blacksmith
      - merchant
      - soldier

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      You wake before dawn. The air is cool, the village is quiet, and pale light creeps
      through the shutters. You lie still for a moment, listening to the town breathe.
      Somewhere outside: a dog barking twice and then stopping. The well-rope groaning
      in the wind. A morning like any other except for something you cannot name, a
      low-grade alertness behind your sternum.
    choices:
      - id: visit_well
        label: Head to the village well for fresh water
        consequences:
          - type: stat
            target: strength
            value: 1
        exhaustionCost: 1
        nextNodeId: at_the_well
      - id: stay_in
        label: Sit by the window and watch the village wake
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: watching_window

  at_the_well:
    id: at_the_well
    text: >-
      At the well you find {neighbor.name} already drawing water, moving through the
      motions with the particular economy of someone who has not slept. They manage a
      smile when they see you. "Could not sleep either? Strange lights on the ridge last
      night. Did you see them?" They set their bucket down and lower their voice. "Three
      of them. Moving slow. Not lanterns lanterns swing. These floated."
    choices:
      - id: ask_lights
        label: Ask what exactly they saw press for details
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{neighbor.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: neighbor_describes
      - id: offer_help
        label: Offer to help carry their water back and hear more on the way
        consequences:
          - type: relationship
            target: '{neighbor.id}'
            value: 2
            axis: trust
          - type: faction
            target: village_folk
            value: 1
        exhaustionCost: 1
        nextNodeId: neighbor_describes

  watching_window:
    id: watching_window
    text: >-
      The village stirs slowly. A baker crosses the square with a crate of loaves.
      A cat sits on the granary steps, unimpressed. Then you see {neighbor.name} cutting
      a quick diagonal across the square, looking over their shoulder in a way that snags
      your attention. They glance up at your window. They see you. They stop and beckon
      urgently, then hold a finger to their lips.
    choices:
      - id: go_down
        label: Go down something is wrong
        consequences:
          - type: relationship
            target: '{neighbor.id}'
            value: 1
            axis: affection
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 1
        nextNodeId: neighbor_describes
      - id: signal_wait
        label: Hold up a hand wait there and pull on your boots first
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: neighbor_describes

  neighbor_describes:
    id: neighbor_describes
    text: >-
      {neighbor.name} speaks in a low, rapid rush. Last night, just past the second
      watch-bell, they saw three lights moving across the ridge above the Ashwood. Slow,
      deliberate, too evenly spaced to be animals. They came down toward the old shepherd
      track and then simply stopped. Went out one by one. "I went up this morning
      before you were awake," {neighbor.name} says. "There is something there. Marks in
      the ground. I did not go close." They are watching your face carefully.
    choices:
      - id: offer_to_go_look
        label: Offer to go up together and see what the marks are
        consequences:
          - type: relationship
            target: '{neighbor.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: ridge_marks_discovered
            value: true
        exhaustionCost: 2
        nextNodeId: at_the_ridge
      - id: ask_who_else_knows
        label: Ask who else they have told
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: asking_who_knows

  asking_who_knows:
    id: asking_who_knows
    text: >-
      {neighbor.name} hesitates. "No one. I came straight to you." Something in their
      voice says that was a considered decision, not a convenient one. "I did not want
      to cause a fuss if it is nothing. But I also did not want to go back up there
      alone." They pause. "And... I have seen you pay attention to things most people
      walk past."
    choices:
      - id: accept_the_trust
        label: Accept that go up to the ridge with them
        consequences:
          - type: relationship
            target: '{neighbor.id}'
            value: 2
            axis: affection
          - type: world_fact
            target: ridge_marks_discovered
            value: true
        exhaustionCost: 2
        nextNodeId: at_the_ridge
      - id: suggest_guard
        label: Suggest they take this to the night watch carefully
        consequences:
          - type: faction
            target: town_guard
            value: 1
          - type: world_fact
            target: ridge_lights_reported
            value: true
        exhaustionCost: 1
        nextNodeId: morning_reflection

  at_the_ridge:
    id: at_the_ridge
    text: >-
      The shepherd track is wet with dew. {neighbor.name} leads you to a flat section
      of ground just below the ridgeline. The marks are unmistakable once you see them:
      three shallow circles, each about a foot across, pressed into the soft earth in a
      perfect equilateral triangle. The grass inside each circle is yellowed. Dead, but
      not burned. In the centre of the triangle, a single smooth stone that was not there
      before you can see the undisturbed moss around where it was placed. {neighbor.name}
      grips your arm. "Someone put that there on purpose."
    choices:
      - id: take_the_stone
        label: Pick up the stone and bring it back to examine properly
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: ridge_stone_taken
            value: true
        exhaustionCost: 1
        nextNodeId: morning_reflection
      - id: leave_stone_in_place
        label: Leave everything as you found it you want to watch this spot
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: ridge_site_undisturbed
            value: true
        exhaustionCost: 0
        nextNodeId: morning_reflection
      - id: mark_and_go_for_help
        label: Mark the location carefully and go straight for someone with knowledge
        consequences:
          - type: world_fact
            target: ridge_marks_discovered
            value: true
          - type: world_fact
            target: seeking_answers_about_ridge
            value: true
          - type: faction
            target: town_guard
            value: 1
        exhaustionCost: 1
        nextNodeId: morning_reflection

  morning_reflection:
    id: morning_reflection
    text: >-
      By the time you are back in the square, the village is fully awake. Smoke from
      the bakehouse, the clang of the smithy starting up, children sent for water.
      {neighbor.name} walks beside you for a while without speaking. Before they peel
      off toward their own door, they say quietly: "Thank you. For coming with me.
      For not thinking I was mad." You watch them go, the morning pressing in around
      you with its ordinary noise, the ridge behind the roofline, out of sight.
    choices:
      - id: stay_alert
        label: Keep this to yourself and stay alert wait and see what comes next
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: ridge_lights_witnessed
            value: true
        exhaustionCost: 0
        nextNodeId: null
      - id: write_it_down
        label: Go home and write down every detail while it is fresh
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: ridge_lights_recorded
            value: true
        exhaustionCost: 0
        nextNodeId: null
