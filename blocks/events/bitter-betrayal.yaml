id: bitter_betrayal
name: Bitter Betrayal
tags:
  - social
  - intrigue
  - danger

preconditions:
  - type: relationship_axis
    axis: trust
    min: 3

roles:
  - id: traitor
    label: Someone You Trusted
    traitRequirements:
      cunning:
        min: 3

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      You hear it from two different people before you believe it: {traitor.name} — someone you
      trusted, helped, maybe confided in — has been talking. Not just talking. They gave information
      about you to the wrong people: to the guard, to the merchants, to someone else's scheme.
      Your name in the wrong mouth at the wrong time. You find them at the end of the day, alone,
      and they know from your face that you know.
    choices:
      - id: confront_directly
        label: Confront them directly — you want to hear it from them
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{traitor.id}'
            value: -3
            axis: trust
        exhaustionCost: 2
        nextNodeId: confronted
      - id: cut_ties_silently
        label: Say nothing — walk past them and cut them out of your life
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{traitor.id}'
            value: -4
            axis: trust
          - type: relationship_tag
            target: '{traitor.id}'
            value: rival
        exhaustionCost: 1
        nextNodeId: cut_ties
      - id: forgive
        label: Approach them calmly — ask why, then consider forgiving
        consequences:
          - type: stat
            target: charisma
            value: 2
          - type: relationship
            target: '{traitor.id}'
            value: -1
            axis: trust
        exhaustionCost: 2
        nextNodeId: forgave

  confronted:
    id: confronted
    text: >-
      {traitor.name} does not deny it. They explain — badly. Pressure from above, fear for their
      own skin, a debt they could not refuse. None of it makes it right, and they know it. "I did
      not think it would reach you like this," they say, which is perhaps the worst thing they
      could say. Your hands are very still.
    choices:
      - id: rage
        label: Let your anger out — they deserve to hear all of it
        consequences:
          - type: stat
            target: strength
            value: 1
          - type: relationship
            target: '{traitor.id}'
            value: -2
            axis: rivalry
          - type: relationship_tag
            target: '{traitor.id}'
            value: rival
        exhaustionCost: 2
        nextNodeId: null
      - id: cold_dismissal
        label: Tell them you have nothing more to say to them — and mean it
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: relationship
            target: '{traitor.id}'
            value: 3
            axis: fear
          - type: relationship_tag
            target: '{traitor.id}'
            value: rival
        exhaustionCost: 1
        nextNodeId: null
      - id: demand_amends
        label: Demand they make it right — there is still a chance to fix this
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: world_fact
            target: amends_demanded
            value: true
        exhaustionCost: 2
        nextNodeId: null

  cut_ties:
    id: cut_ties
    text: >-
      {traitor.name} calls after you. You do not stop. That night, you go through your memories
      and identify everything they might have heard from you. The accounting is bitter work. You
      adjust your behavior accordingly. This is what the end of trust looks like — not drama, just
      a door closing quietly.
    choices:
      - id: protect_yourself
        label: Take steps to protect yourself from the fallout
        consequences:
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 2
        nextNodeId: null
      - id: warn_others
        label: Quietly warn others who might have trusted them too
        consequences:
          - type: faction
            target: village_folk
            value: 1
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 1
        nextNodeId: null

  forgave:
    id: forgave
    text: >-
      {traitor.name} tells you everything — who asked, what was given, what was held back.
      It is a full accounting. Whether it absolves them is your call. "I am sorry," they say,
      and it sounds genuine. "I was afraid." You sit with that for a moment. Fear is understandable.
      It is not the same as forgivable. But it is a starting place.
    choices:
      - id: extend_forgiveness
        label: Forgive them — but make clear it cannot happen again
        consequences:
          - type: stat
            target: charisma
            value: 2
          - type: relationship
            target: '{traitor.id}'
            value: 1
            axis: trust
          - type: relationship
            target: '{traitor.id}'
            value: 2
            axis: respect
        exhaustionCost: 1
        nextNodeId: null
      - id: forgive_but_distance
        label: Forgive them in your heart — but keep your distance going forward
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{traitor.id}'
            value: -2
            axis: trust
        exhaustionCost: 0
        nextNodeId: null
