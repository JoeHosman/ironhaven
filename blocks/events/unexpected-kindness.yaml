id: unexpected_kindness
name: Unexpected Kindness
tags:
  - social
  - romance

preconditions: []

roles:
  - id: stranger
    label: A Kind Stranger
    traitRequirements:
      charisma:
        min: 3

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      You drop your goods in the mud — a full morning's worth of market supplies scattered across
      the lane. You swear under your breath, crouching to gather what you can. Then {stranger.name}
      is there beside you without a word, picking up root vegetables with practiced efficiency.
      They hand you back a jar of oil you somehow did not notice rolling toward the gutter. They
      smile and say nothing.
    choices:
      - id: thank_warmly
        label: Thank them warmly and start a conversation
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{stranger.id}'
            value: 2
            axis: affection
          - type: relationship
            target: '{stranger.id}'
            value: 2
            axis: trust
        exhaustionCost: 1
        nextNodeId: thanked_warmly
      - id: thank_briefly
        label: Thank them briefly and go about your business
        consequences:
          - type: relationship
            target: '{stranger.id}'
            value: 1
            axis: trust
        exhaustionCost: 0
        nextNodeId: thanked_briefly
      - id: be_suspicious
        label: Thank them but keep your guard up — why would a stranger bother?
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{stranger.id}'
            value: -1
            axis: trust
        exhaustionCost: 0
        nextNodeId: suspicious

  thanked_warmly:
    id: thanked_warmly
    text: >-
      {stranger.name} seems surprised by your warmth, then pleased by it. You learn their name,
      their trade, where they are from. The conversation lasts longer than it should; you are
      nearly late to your next errand. They laugh when you realize it. "Go," they say. "We will
      talk again."
    choices:
      - id: offer_to_return_favor
        label: Offer to return the kindness — they should come to you if they need anything
        consequences:
          - type: relationship
            target: '{stranger.id}'
            value: 2
            axis: trust
          - type: relationship
            target: '{stranger.id}'
            value: 1
            axis: affection
          - type: relationship_tag
            target: '{stranger.id}'
            value: friend
        exhaustionCost: 1
        nextNodeId: null
      - id: let_it_end_there
        label: Let it be a pleasant encounter and move on
        consequences:
          - type: relationship
            target: '{stranger.id}'
            value: 1
            axis: affection
        exhaustionCost: 0
        nextNodeId: null

  thanked_briefly:
    id: thanked_briefly
    text: >-
      {stranger.name} nods and walks away. You watch them for a moment, already wondering who
      they are. A small thing — but the day feels slightly easier for it.
    choices:
      - id: seek_them_out
        label: Look for them later — you owe them a proper thank-you
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{stranger.id}'
            value: 2
            axis: trust
        exhaustionCost: 1
        nextNodeId: null
      - id: carry_on
        label: Carry on — it was a small thing
        consequences: []
        exhaustionCost: 0
        nextNodeId: null

  suspicious:
    id: suspicious
    text: >-
      {stranger.name} catches the edge in your tone. Their smile fades slightly. "Just helping,"
      they say, and leave without pressing the point. You feel the faint sting of having misjudged
      something, or of having been exactly right. Difficult to know.
    choices:
      - id: reconsider
        label: Reconsider — being guarded cost you a kindness. Catch up with them.
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{stranger.id}'
            value: 2
            axis: trust
        exhaustionCost: 1
        nextNodeId: null
      - id: stay_guarded
        label: Stay guarded. It does not hurt to be careful.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: null
