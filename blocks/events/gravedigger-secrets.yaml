id: gravedigger_secrets
name: Gravedigger's Secrets
tags:
  - mystery
  - intrigue
  - social

preconditions:
  - type: archetype
    key: archetype
    value: gravedigger

roles:
  - id: town_priest
    label: The Town Priest
    archetypeFilter:
      - priest

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      Most days the cemetery is a quiet workplace. Today you are digging a plot in the older
      section and your spade turns up something that is not earth and not stone: a small
      leather case, oilskin-wrapped, sealed with a clasp that looks recent against the age
      of everything around it. Someone placed this here within the last few years, in a grave
      that has been settled for thirty. {town_priest.name} is visible at the far gate, doing
      their morning circuit. You hold the case and think about the particular ethic of your
      work: the dead deserve their privacy, but the living have needs too.
    choices:
      - id: open_the_case
        label: Open it. If someone left this here, there was a reason.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: hidden_case_opened
            value: true
        exhaustionCost: 1
        nextNodeId: what_is_inside
      - id: bring_it_to_priest
        label: Bring it to {town_priest.name} unopened. Let them handle it.
        consequences:
          - type: relationship
            target: '{town_priest.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: hidden_case_given_to_priest
            value: true
        exhaustionCost: 1
        nextNodeId: the_priest_reacts
      - id: replace_it
        label: Put it back exactly where you found it. It is not yours to find.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: hidden_case_replaced
            value: true
        exhaustionCost: 1
        nextNodeId: the_grave_speaks

  what_is_inside:
    id: what_is_inside
    text: >-
      Letters. Fourteen of them, written in a clear hand to a name you recognize from the
      town's oldest families, the ones who have been here long enough to have built the walls
      of three of the significant buildings. The letters are love letters, careful and urgent,
      and they are addressed from a person who, according to every official record, died before
      these letters could have been written. Either the records are wrong or the dead correspondent
      found a way. Neither explanation is comfortable.
    choices:
      - id: read_them_all
        label: Read all fourteen letters carefully
        preconditions:
          - type: trait
            key: cunning
            min: 3
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: hidden_letters_read
            value: true
        exhaustionCost: 2
        nextNodeId: what_the_letters_mean
      - id: read_one_and_stop
        label: Read the first letter, and then put them back without reading more
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: hidden_letters_partially_read
            value: true
        exhaustionCost: 1
        nextNodeId: what_the_letters_mean

  the_priest_reacts:
    id: the_priest_reacts
    text: >-
      {town_priest.name} takes the case. They do not open it in front of you, but their hands
      on it tell you something: they recognize it. Not the case itself maybe, but the weight
      of it, the shape of what it probably contains. "Thank you," they say, in the particular
      tone of someone receiving something they have been expecting and hoping would not come.
      "I will take care of it." They meet your eyes steadily. "This does not need to go any
      further." It is a statement, not quite a request.
    choices:
      - id: agree_to_silence
        label: Agree. It is not your business.
        consequences:
          - type: relationship
            target: '{town_priest.id}'
            value: 2
            axis: trust
          - type: world_fact
            target: cemetery_secret_kept
            value: true
        exhaustionCost: 0
        nextNodeId: the_grave_speaks
      - id: ask_what_it_is
        label: Ask what is inside before agreeing to keep silent
        preconditions:
          - type: trait
            key: cunning
            min: 3
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: relationship
            target: '{town_priest.id}'
            value: -1
            axis: trust
          - type: world_fact
            target: cemetery_secret_questioned
            value: true
        exhaustionCost: 1
        nextNodeId: the_grave_speaks

  what_the_letters_mean:
    id: what_the_letters_mean
    text: >-
      The letters tell a story that the official records, the ones on paper, do not contain.
      The person who was recorded as dead was not dead, or not in the way the records describe.
      The family that has held this town's most important mill, and three of its most important
      debts, has been built on an inheritance that was claimed under false circumstances.
      The letters do not say this directly. They say it the way that all true things in difficult
      situations are said: around the edges, in what is assumed and left unwritten, in the
      particular tenderness of people who know they cannot speak plainly.
    choices:
      - id: bring_to_authorities
        label: Bring the letters to the magistrate. The inheritance should be examined.
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: faction
            target: townspeople
            value: 1
          - type: world_fact
            target: inheritance_fraud_reported
            value: true
        exhaustionCost: 2
        nextNodeId: the_grave_speaks
      - id: approach_the_family
        label: Approach the family directly. Give them the chance to make it right.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: family_approached_privately
            value: true
        exhaustionCost: 2
        nextNodeId: the_grave_speaks
      - id: return_them_to_the_grave
        label: Put them back exactly as found. Some truths are better left where they were buried.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: hidden_letters_reburied
            value: true
        exhaustionCost: 0
        nextNodeId: the_grave_speaks

  the_grave_speaks:
    id: the_grave_speaks
    text: >-
      You finish the new plot and smooth the earth and stand for a moment in the afternoon
      quiet of the cemetery. You have been working here long enough to know that the stories
      of the dead do not stay dead: they seep up through the ground, slow and patient, the
      way water finds the cracks in stone. Every grave here is a sentence that was not finished.
      Every morning you come in, you are working in a library of incomplete stories. Most of
      them you will never read. Today you read one.
    choices:
      - id: record_what_you_know
        label: Write down what you found and where, keeping the record for yourself
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: cemetery_record_kept
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: continue_your_work
        label: Finish the work and go home. You are a gravedigger, not an investigator.
        consequences:
          - type: stat
            target: strength
            value: 1
        exhaustionCost: 1
        nextNodeId: null
